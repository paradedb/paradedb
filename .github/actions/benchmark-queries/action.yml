name: Benchmark - Queries
description: Run a given benchmark dataset against pg_search and publish metrics

inputs:
  dataset:
    description: "The benchmark dataset to run (e.g. logs, docs, stackoverflow)"
    required: true
  size:
    description: "Size label for pre-sampled dataset, e.g. '100k', '1m', '20m'"
    required: true
  ref:
    description: "Git ref or short SHA to report in benchmarks"
    required: true
  github_token:
    description: "GitHub token to authenticate with"
    required: true
  slack_oauth_token:
    description: "Slack OAuth token to authenticate with"
    required: true
  slack_channel:
    description: "Slack channel to post results to"
    required: true
  pr_label:
    description: "The human readable version of the commit being tested"
    required: true
  fail_on_error:
    description: "Whether to fail on query errors. Set to 'false' for backfills against older versions."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run Benchmarks
      working-directory: benchmarks/
      shell: bash
      run: |
        POSTGRES_URL="postgresql://localhost:288${{ env.pg_version }}/postgres"

        # Pre-sampled dataset loaded from S3.
        cargo run --release -- benchmark \
          --url "${POSTGRES_URL}" \
          --size ${{ inputs.size }} \
          --dataset ${{ inputs.dataset }} \
          --data-source s3://paradedb-ci-benchmarks/datasets/${{ inputs.dataset }}/ \
          --runs 10 \
          --output json \
          --fail-on-error ${{ inputs.fail_on_error }}

        echo "ROWS_LABEL=${{ inputs.size }}" >> $GITHUB_ENV

    # Group alternatives that share the same trailing `SELECT` (only the
    # `SET` prefix differs, e.g. PG default vs DataFusion agg vs MPP), run
    # each variant and compare hashed result sets. `num_results` alone
    # can't tell `COUNT(*) = 42` from `COUNT(*) = 99` (both have one row),
    # so we hash the sorted rows and require an exact match. Alternatives
    # with different `SELECT`s (different query shapes) don't get compared.
    - name: Verify alternative-vs-base result equality
      working-directory: benchmarks/
      shell: bash
      env:
        DATASET: ${{ inputs.dataset }}
      run: |
        python3 - <<'PY'
        import glob, hashlib, os, re, subprocess, sys

        dataset = os.environ["DATASET"]
        url = f"postgresql://localhost:288{os.environ['pg_version']}/postgres"

        def alternatives(path):
            with open(path) as f:
                content = f.read()
            out = []
            for raw in content.split(";\n"):
                stripped = " ".join(
                    line.split("--")[0].strip() for line in raw.splitlines()
                ).strip()
                if stripped:
                    out.append(stripped)
            return out

        def select_text(stmt):
            return stmt.rsplit(";", 1)[-1].strip().lower()

        def hash_rows(stmt):
            # Use raw `psql` so SET ... ; SELECT ... runs in a single session.
            # `-At` gives unaligned, tuple-only output; rows sorted to absorb
            # non-deterministic ordering in `ORDER BY`-less queries.
            proc = subprocess.run(
                ["psql", url, "-At", "-v", "ON_ERROR_STOP=1", "-c", stmt],
                capture_output=True, text=True
            )
            if proc.returncode != 0:
                return None, (proc.stderr or proc.stdout).strip()
            rows = sorted(proc.stdout.splitlines())
            return hashlib.sha256("\n".join(rows).encode()).hexdigest(), None

        mismatches, errors = [], []
        for path in sorted(glob.glob(f"datasets/{dataset}/queries/*.sql")):
            base = os.path.basename(path)
            alts = alternatives(path)
            by_select = {}
            for idx, alt in enumerate(alts):
                by_select.setdefault(select_text(alt), []).append((idx, alt))
            for sel, members in by_select.items():
                if len(members) < 2:
                    continue
                results = []
                for idx, alt in members:
                    h, err = hash_rows(alt)
                    if err:
                        errors.append((base, idx, err))
                    results.append((idx, h))
                if len({h for _, h in results if h is not None}) > 1:
                    mismatches.append((base, sel, results))

        if errors:
            print("Query errors:")
            for f, i, e in errors:
                print(f"  {f} alt {i}: {e}")
        if mismatches:
            print("\nAlternatives with the same SELECT but different result sets:")
            for f, sel, results in mismatches:
                snip = sel[:120] + ("..." if len(sel) > 120 else "")
                print(f"  {f}: {snip}")
                for i, h in results:
                    print(f"    alt {i}: {h}")
        if errors or mismatches:
            sys.exit(1)
        print("All same-SELECT alternatives returned identical result sets.")
        PY

    - name: Print the Postgres Logs
      if: failure()
      shell: bash
      run: cat ~/.pgrx/${{ env.pg_version }}.log

    # Necessary to avoid "destination path is not empty" error
    - name: Cleanup Previous Benchmark Publish Working Directory
      shell: bash
      run: rm -rf ./benchmark-data-repository

    # we sleep for a random number of seconds to hopefully avoid conflicting with other concurrent
    # benchmark-action publish actions running in other jobs
    - name: Sleep before publish
      if: github.ref == 'refs/heads/main'
      shell: bash
      run: echo $(( 1 + RANDOM % ( 61 - 1 + 1 ) ))

    - name: Publish Benchmark Metrics
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: "pg_search '${{ inputs.dataset }}' (${{ env.ROWS_LABEL }} rows)"
        ref: ${{ inputs.ref }}
        tool: customSmallerIsBetter
        output-file-path: benchmarks/results.json
        github-token: ${{ inputs.github_token }}
        gh-repository: github.com/${{ github.repository }}
        gh-pages-branch: gh-pages
        auto-push: ${{ github.ref == 'refs/heads/main' }}
        benchmark-data-dir-path: benchmarks
        alert-threshold: "115%"
        comment-on-alert: true # We comment and alert rather than failing, as we have both Github and Slack messages to notify us
        alert-comment-cc-users: "@${{ github.actor }}"
        comment-always: ${{ github.event_name == 'pull_request' }}

    - name: Upload Benchmark Results to Slack (push only)
      if: github.ref == 'refs/heads/main'
      uses: slackapi/slack-github-action@v3
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_oauth_token }}
        payload: |
          channel: ${{ inputs.slack_channel }}
          text: |
            ${{ github.repository }} Benchmark Results: `${{ inputs.dataset }}` (${{ env.ROWS_LABEL }} rows)
            <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ inputs.pr_label }}> @ <https://paradedb.github.io/${{ github.event.repository.name }}/benchmarks/>
