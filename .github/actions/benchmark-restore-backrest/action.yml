name: Benchmark Restore pgBackRest
description: Restore a dataset's heap snapshot from S3 into $PGDATA with pgBackRest, then start Postgres

inputs:
  dataset:
    description: "The benchmark dataset to restore (e.g. stackoverflow)"
    required: true
  size:
    description: "Size label of the snapshot to restore, e.g. '100k', '1m', '20m'"
    required: true
  pg_version:
    description: "PostgreSQL major version"
    required: false
    default: "18"
  repo_bucket:
    description: "S3 bucket holding the pgBackRest repository"
    required: false
    default: "paradedb-ci-benchmarks"
  repo_path_prefix:
    description: "Path prefix within the bucket; dataset/size is appended"
    required: false
    default: "/snapshots"

runs:
  using: "composite"
  steps:
    - name: Setup pgBackRest
      id: backrest
      uses: ./.github/actions/benchmark-setup-backrest
      with:
        dataset: ${{ inputs.dataset }}
        size: ${{ inputs.size }}
        pg_version: ${{ inputs.pg_version }}
        repo_bucket: ${{ inputs.repo_bucket }}
        repo_path_prefix: ${{ inputs.repo_path_prefix }}

    - name: Verify snapshot exists
      shell: bash
      env:
        CONF: ${{ steps.backrest.outputs.config }}
        STANZA: ${{ steps.backrest.outputs.stanza }}
      run: |
        set -euo pipefail
        INFO_JSON=$(pgbackrest --config="${CONF}" --stanza="${STANZA}" --output=json info || true)
        BACKUP_COUNT=$(echo "${INFO_JSON}" | python3 -c "import sys, json; print(sum(len(s.get('backup', [])) for s in json.load(sys.stdin)))" 2>/dev/null || echo 0)
        if [ "${BACKUP_COUNT}" -eq 0 ]; then
          echo "::error::No pgBackRest snapshot found for '${{ inputs.dataset }}' (${{ inputs.size }}). Run the 'generate-benchmark-snapshots' workflow to create it."
          exit 1
        fi
        echo "Found ${BACKUP_COUNT} snapshot backup(s) for '${{ inputs.dataset }}' (${{ inputs.size }})."

    # pgBackRest restores in place with --delta, which requires a stopped cluster.
    - name: Stop Postgres
      working-directory: pg_search/
      shell: bash
      run: cargo pgrx stop pg${{ inputs.pg_version }}

    - name: Restore heap snapshot from S3 with pgBackRest
      shell: bash
      env:
        CONF: ${{ steps.backrest.outputs.config }}
        STANZA: ${{ steps.backrest.outputs.stanza }}
      run: |
        set -euo pipefail
        # --delta restores in place over the existing pgrx data dir, copying only changed files.
        # Restores the latest backup in the repo by default.
        pgbackrest --config="${CONF}" --stanza="${STANZA}" --delta restore

    - name: Start Postgres
      working-directory: pg_search/
      shell: bash
      run: cargo pgrx start pg${{ inputs.pg_version }}
