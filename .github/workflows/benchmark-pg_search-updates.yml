# workflows/benchmark-pg_search-updates.yml
#
# Benchmark pg_search (Vector Updates)
# Measure how a pgvector index behaves as the corpus grows under bulk inserts: build the index on the
# first chunk of cohere `sampled/1m`, then insert the remaining 9 chunks one at a time, running the
# latency queries and measuring recall between each insert. This surfaces recall/latency degradation
# of an incrementally-maintained index (vs. the one-shot build the queries benchmark measures). The
# signal of interest is relative (how much recall/latency drift as the index grows), not absolute.
#
# Opt-in only -- expensive and slow (HNSW inserts are single-threaded). Trigger via the
# benchmark-cohere-updates-{hnsw,ivfflat} PR labels or a manual run.

name: Benchmark pg_search (Vector Updates)

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      cohere_index:
        description: "Which cohere index to grow under updates."
        required: true
        default: hnsw
        type: choice
        options:
          - hnsw
          - ivfflat

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark-pg_search-updates:
    name: Run Vector Update Benchmark
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=m8gd.metal-24xl
      - image=ubuntu24-full-arm64
      - extras=s3-cache
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        contains(fromJson('["benchmark-cohere-updates-hnsw", "benchmark-cohere-updates-ivfflat"]'), github.event.label.name)
      )
    env:
      pg_version: 18
      # hnsw or ivfflat, from the dispatch input or the label name.
      COHERE_INDEX: ${{ inputs.cohere_index || (github.event.label.name == 'benchmark-cohere-updates-ivfflat' && 'ivfflat') || 'hnsw' }}

    steps:
      - name: Maybe Remove Label
        if: >-
          github.event_name == 'pull_request' &&
          contains(fromJson('["benchmark-cohere-updates-hnsw", "benchmark-cohere-updates-ivfflat"]'), github.event.label.name)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --remove-label benchmark-cohere-updates-hnsw \
            --remove-label benchmark-cohere-updates-ivfflat || true

      # github.sha is the PR merge commit for pull_request events (exists in the base repo even for
      # forks) and the dispatched commit for workflow_dispatch -- either way the code under test,
      # including the new --append flag and this workflow.
      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_CI_SUBACCOUNT_GITHUB_ACTIONS_USER_AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_CI_SUBACCOUNT_GITHUB_ACTIONS_USER_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Leaves an empty Postgres running with pg_search available. Unlike the queries benchmark we do
      # not restore a heap snapshot -- the corpus is built up from empty, one chunk at a time.
      - name: Set up benchmark cluster
        uses: ./.github/actions/setup-benchmark-cluster
        with:
          pg_version: ${{ env.pg_version }}

      # Grow cohere from empty to `sampled/1m` in 10 disjoint ~100k chunks (see
      # benchmarks/scripts/split_cohere_chunks.sh). The index is built once, on the first chunk,
      # sized to that first chunk (COHERE_INDEX). Each later chunk is appended (--append) so the index
      # is maintained incrementally rather than rebuilt (--skip-index true, --vacuum false -- VACUUM
      # FULL would reindex). Between inserts we run the latency queries and measure recall@10, at each
      # step's cumulative size (100k..1m) so probes/ef_search track the corpus. Recall scores against
      # the durable per-step ground-truth parquets in S3 (ground_truth_{query}_upd_1m_{cum}.parquet),
      # pre-generated by scripts/generate_cohere_ground_truth.sh, via --ground-truth-path.
      - name: Grow cohere under updates and measure latency + recall
        working-directory: benchmarks/
        run: |
          set -euo pipefail
          POSTGRES_URL="postgresql://localhost:288${{ env.pg_version }}/postgres"

          # Cumulative corpus size after each of the 10 chunks.
          CUM=(100k 200k 300k 400k 500k 600k 700k 800k 900k 1m)

          printf 'size\tquery\tlatency_ms\trecall\n' > updates_summary.tsv

          for k in $(seq 0 9); do
            size="${CUM[$k]}"
            echo "::group::step ${k} (${size})"

            if [ "$k" -eq 0 ]; then
              cargo run --release -- load-heap \
                --url "$POSTGRES_URL" --dataset cohere --size "1m_chunk0" --single-file
              # Build the index on the first chunk, sized to that chunk's cumulative size.
              cargo run --release -- benchmark \
                --url "$POSTGRES_URL" --dataset cohere --index "${{ env.COHERE_INDEX }}" \
                --size "$size" --runs 10 --output json --skip-index false --vacuum false
            else
              cargo run --release -- load-heap \
                --url "$POSTGRES_URL" --dataset cohere --size "1m_chunk${k}" --append --single-file
              # Query the incrementally-maintained index; do not rebuild it.
              cargo run --release -- benchmark \
                --url "$POSTGRES_URL" --dataset cohere --index "${{ env.COHERE_INDEX }}" \
                --size "$size" --runs 10 --output json --skip-index true --vacuum false
            fi

            # Refresh planner stats without reindexing (VACUUM FULL would rebuild the index).
            psql "$POSTGRES_URL" -c "ANALYZE cohere_wiki;"

            # Latency: mean ms per query from the benchmark's JSON output.
            while IFS=$'\t' read -r name value; do
              printf '%s\t%s\t%s\t\n' "$size" "$name" "$value" >> updates_summary.tsv
            done < <(jq -r '.[] | [.name, (.value|tostring)] | @tsv' results.json)

            # Recall@10 per query, against the durable per-step ground truth in S3. --size scales the
            # query's probes/ef_search; --ground-truth-path selects the ground truth for this step's
            # cumulative corpus (chunks 0..k).
            gt_base="s3://paradedb-benchmarks/datasets/cohere/queries"
            for f in datasets/cohere/queries/*.sql; do
              q=$(basename "$f" .sql)
              out=$(cargo run --release -- recall \
                --url "$POSTGRES_URL" --dataset cohere --size "$size" --query "$q" \
                --ground-truth-path "${gt_base}/ground_truth_${q}_upd_1m_${size}.parquet")
              echo "$out"
              r=$(printf '%s\n' "$out" | sed -n 's/^recall = //p')
              # Append recall onto the matching latency row for this (size, query).
              printf '%s\t%s\t\t%s\n' "$size" "$q" "${r:-n/a}" >> updates_summary.tsv
            done

            echo "::endgroup::"
          done

          echo "== updates_summary.tsv =="
          cat updates_summary.tsv

      - name: Build summary table
        if: ${{ !cancelled() }}
        working-directory: benchmarks/
        run: |
          set -euo pipefail
          {
            printf '### Cohere vector-update benchmark — `%s` index\n\n' "${{ env.COHERE_INDEX }}"
            printf 'Corpus grown from empty to `sampled/1m` in 10 ~100k chunks; index built once on the first chunk and maintained incrementally.\n\n'
            printf '| size | query | latency (ms) | recall@10 |\n|------|-------|-------------|-----------|\n'
            # Merge the latency-only and recall-only rows for each (size, query) into one line.
            tail -n +2 updates_summary.tsv | awk -F'\t' '
              { key=$1 SUBSEP $2; if($3!="")lat[key]=$3; if($4!="")rec[key]=$4; if(!(key in seen)){seen[key]=1; order[++n]=key} }
              END { for(i=1;i<=n;i++){ split(order[i],a,SUBSEP); printf "| %s | `%s` | %s | %s |\n", a[1], a[2], (lat[order[i]]==""?"n/a":lat[order[i]]), (rec[order[i]]==""?"n/a":rec[order[i]]) } }'
            printf '\n<sub>latency = mean ms over 10 warmed runs; recall@10 vs exact nearest neighbors over a held-out query set, at each step'"'"'s cumulative corpus size and the same probes/ef_search as the latency benchmark.</sub>\n'
          } > updates_body.md
          cat updates_body.md
          cat updates_body.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment results on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        working-directory: benchmarks/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --body-file updates_body.md

      - name: Print the Postgres Logs
        if: failure()
        run: cat ~/.pgrx/${{ env.pg_version }}.log
