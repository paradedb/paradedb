# workflows/compact-gh-pages.yml
#
# Compact gh-pages History
# Squash gh-pages to a single commit so the branch stays small. The benchmark
# publish workflows append one commit per run, which has accumulated to a
# branch much larger than its working tree. This job rewrites gh-pages weekly
# to a single orphan commit holding the current tree.

name: Compact gh-pages History

on:
  schedule:
    - cron: "0 4 * * 0" # Every Sunday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

# Don't run two compactions at once. Don't cancel an in-flight run either,
# since it ends in a force-push and a half-run is wasted work.
concurrency:
  group: compact-gh-pages
  cancel-in-progress: false

jobs:
  compact:
    name: Squash gh-pages to a Single Commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Squash and Force-Push
        run: |
          set -euo pipefail
          git config user.name "Compact gh-pages Job"
          git config user.email "developers@paradedb.com"

          # Capture the tip we checked out so --force-with-lease can detect
          # any benchmark publish that lands while we're running and abort
          # rather than overwriting it.
          original_tip=$(git rev-parse HEAD)

          # Skip if gh-pages is already a single commit — nothing to compact.
          parent_count=$(git cat-file -p "$original_tip" | grep -c '^parent ' || true)
          if [ "$parent_count" -eq 0 ]; then
            echo "gh-pages is already a single orphan commit; nothing to compact."
            exit 0
          fi

          # Build an orphan branch holding the current tree as a single commit.
          git checkout --orphan compact-tmp
          git add -A
          git commit -m "Compact gh-pages history"

          git push --force-with-lease="refs/heads/gh-pages:$original_tip" \
            origin HEAD:refs/heads/gh-pages
