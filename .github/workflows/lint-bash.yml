# workflows/lint-bash.yml
#
# Lint Bash
# Lint and enforce good practices for Bash scripts.

name: Lint Bash

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: lint-bash-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # We use dorny/paths-filter instead of on.pull_request.paths because the
  # built-in paths filter skips the entire workflow — including the required
  # gate job — which causes branch protection to block merges indefinitely.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Detect File Changes
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - "**/*.sh"
              - ".github/workflows/lint-bash.yml"

  lint-bash:
    name: Lint Bash Scripts
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run Beautysh
        run: |
          shopt -s globstar nullglob
          if compgen -G "**/*.sh" > /dev/null; then
            uv tool run --from beautysh beautysh **/*.sh --indent-size 2 --check
          fi
          shopt -u globstar nullglob

      - name: Check Bash Scripts for bash shebang
        run: |
          while read -r file
          do
            shebang="$(head -n 1 "$file")"
            if [[ "$shebang" = "#!/bin/bash" || "$shebang" = "#!/usr/bin/env bash" ]]
            then
              echo "[bash shebang -> Present] $file"
            else
              echo "[bash shebang -> NOT FOUND] $file" && exit 1
            fi
          done < <(find . -name '*.sh')

      - name: Check Bash Scripts for strict mode opt-in
        run: |
          while read -r file
          do
            if grep -q \
              -e "^[[:space:]]*set -euo pipefail$" \
              -e "^[[:space:]]*set -Eeuo pipefail$" \
              -e "^# @paradedb-skip-check-pipefail$" \
              "$file"
            then
              echo "[strict mode -> Present] $file"
            else
              echo "[strict mode -> NOT FOUND] $file" && exit 1
            fi
          done < <(find . -name '*.sh')

      - name: Run ShellCheck
        run: |
          uv run --no-sync python - <<'PY'
          import glob
          import subprocess
          import sys

          sh_files = sorted(set(glob.glob("**/*.sh", recursive=True)))
          if not sh_files:
              print("[Shellcheck skipped] No shell scripts found.")
              sys.exit(0)
          for file in sh_files:
              p = subprocess.run(
                  f"shellcheck -x -P scripts {file}",
                  shell=True,
                  capture_output=True,
                  check=False,
              )
              print(p.stdout.decode())
              if p.returncode != 0:
                  print(f"[Shellcheck did not pass] {file}")
                  sys.exit(1)
          print(f"[Shellcheck passed] {len(sh_files)} script(s)")
          PY

  # Required for branch protection — GitHub lacks "required when present" for
  # status checks so this gate always runs and reports pass/fail. Standard pattern:
  # https://github.com/astral-sh/ruff/blob/main/.github/workflows/ci.yaml
  # https://github.com/orgs/community/discussions/26251
  report-results:
    name: Report Results
    if: always()
    needs: [detect-changes, lint-bash]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI Results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
