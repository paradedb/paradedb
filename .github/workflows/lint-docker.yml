# workflows/lint-docker.yml
#
# Lint Docker
# Lint Dockerfiles using Hadolint.

name: Lint Docker

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/lint-docker.yml"
      - "docker/**"
  workflow_dispatch:

concurrency:
  group: lint-docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-docker:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v7

      - name: Find Dockerfiles
        id: dockerfiles
        run: echo "files=$(find docker -type f -name 'Dockerfile*' ! -path 'docker/Dockerfile.template' -print | sort | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Run Hadolint
        uses: jbergstroem/hadolint-gh-action@v1
        with:
          dockerfile: ${{ steps.dockerfiles.outputs.files }}
          error_level: 2 # Treat INFO as error

      - name: Verify Generated Dockerfiles Are In Sync With Template
        run: |
          version="$(sed -nE 's|.*releases/download/v([^/]+)/postgresql-[0-9]+-pg-search_.*|\1|p' docker/Dockerfile.paradedb-18 | head -n1)"
          docker/generate-dockerfiles.sh "$version"
          git diff --exit-code -- docker
