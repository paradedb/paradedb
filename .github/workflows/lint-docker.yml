# workflows/lint-docker.yml
#
# Lint Docker
# Lint Dockerfiles using Hadolint.

name: Lint Docker

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: lint-docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # We use dorny/paths-filter instead of on.pull_request.paths because the
  # built-in paths filter skips the entire workflow — including the required
  # gate job — which causes branch protection to block merges indefinitely.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Detect File Changes
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - ".github/workflows/lint-docker.yml"
              - "docker/**"

  lint-docker:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: jbergstroem/hadolint-gh-action@v1
        with:
          dockerfile: "**/Dockerfile*"
          error_level: 2 # Treat INFO as error

  # Required for branch protection — GitHub lacks "required when present" for
  # status checks so this gate always runs and reports pass/fail. Standard pattern:
  # https://github.com/astral-sh/ruff/blob/main/.github/workflows/ci.yaml
  # https://github.com/orgs/community/discussions/26251
  report-results:
    name: Report Results
    if: always()
    needs: [detect-changes, lint-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI Results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
