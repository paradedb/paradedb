# workflows/lint-rust.yml
#
# Lint Rust
# Lint Rust files using Clippy and Rustfmt.

name: Lint Rust

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: lint-rust-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # We use dorny/paths-filter instead of on.pull_request.paths because the
  # built-in paths filter skips the entire workflow — including the required
  # gate job — which causes branch protection to block merges indefinitely.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    # `pull-requests: read` is needed by dorny/paths-filter to list changed
    # files on PR events. Org-level defaults grant it today, but pin it
    # explicitly so this gate doesn't break silently if defaults tighten.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Detect File Changes
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - "**/*.rs"
              - "**/*.toml"
              - ".github/workflows/lint-rust.yml"

  lint-rust:
    name: Lint Rust Files
    runs-on:
      # Compute-optimized c-family — Rust clippy/fmt is CPU-bound.
      # See https://runs-on.com/configuration/job-labels/ — runs in us-east-1.
      - runs-on=${{ github.run_id }}
      - family=c7g+c8g
      - cpu=4
      - ram=8
      - image=ubuntu24-full-arm64
      - extras=s3-cache
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'
    strategy:
      matrix:
        pg_version: [18]

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: false
          rustflags: "" # Use .cargo/config.toml target-cpu flags

      - name: Check Cargo.lock
        run: cargo metadata --format-version 1 --locked > /dev/null

      - name: Extract pgrx Version
        id: pgrx
        run: echo "version=$(sed -nE 's/^pgrx = "=?([^"]+)"$/\1/p' Cargo.toml)" >> $GITHUB_OUTPUT

      # Do NOT add hashFiles('**/Cargo.lock') or arch to shared-key.
      # See test-pg_search.yml for rationale.
      - name: Install Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v2-rust-cache"
          shared-key: pg${{ matrix.pg_version }}
          cache-targets: true
          cache-all-crates: true
          # We don't save the cache here to avoid thrashing. The cache is only saved on the nightly run of test-pg_search.yml
          save-if: false

      - name: Install & Configure Supported PostgreSQL Version
        run: |
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update && sudo apt-get install -y libfontconfig1-dev postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }}
          echo "/usr/lib/postgresql/${{ matrix.pg_version }}/bin" >> $GITHUB_PATH

      - name: Install pgrx
        run: cargo install --locked cargo-pgrx --version ${{ steps.pgrx.outputs.version }} --debug

      - name: Initialize pgrx environment
        run: cargo pgrx init --pg${{ matrix.pg_version }}=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config

      - name: Run Rustfmt
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings --no-deps

      - name: Install cargo-machete
        run: cargo install -j $(nproc) cargo-machete --locked --debug

      - name: Install taplo
        run: cargo install -j $(nproc) taplo-cli --version ^0.9 --locked --debug

      - name: Run cargo-machete
        run: cargo machete

      # If you encounter an error, try running 'taplo format' to fix the formatting automatically.
      - name: Check Cargo.toml Formatting
        run: taplo format --check

  # Required for branch protection — GitHub lacks "required when present" for
  # status checks so this gate always runs and reports pass/fail. Standard pattern:
  # https://github.com/astral-sh/ruff/blob/main/.github/workflows/ci.yaml
  # https://github.com/orgs/community/discussions/26251
  report-results:
    name: Report Results
    if: always()
    # When adding a new job to this workflow, also add it to this needs:
    # list — otherwise the gate silently passes when that job fails.
    needs: [detect-changes, lint-rust]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI Results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
