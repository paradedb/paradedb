# workflows/lint-rust.yml
#
# Lint Rust
# Lint Rust files using Clippy and Rustfmt.

name: Lint Rust

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.rs"
      - "**/*.toml"
      - ".github/workflows/lint-rust.yml"
  workflow_dispatch:

concurrency:
  group: lint-rust-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-rust:
    name: Lint Rust Files
    runs-on: ubicloud-standard-4-arm
    strategy:
      matrix:
        pg_version: [18]

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: false

      - name: Check Cargo.lock
        run: cargo metadata --format-version 1 --locked > /dev/null

      - name: Extract pgrx Version
        id: pgrx
        run: echo "version=$(sed -nE 's/^pgrx = "=?([^"]+)"$/\1/p' Cargo.toml)" >> $GITHUB_OUTPUT

      # Do NOT add hashFiles('**/Cargo.lock') or arch to shared-key.
      # See test-pg_search.yml for rationale.
      - name: Install Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "rust-cache"
          shared-key: pg${{ matrix.pg_version }}
          cache-targets: true
          cache-all-crates: true

      - name: Install & Configure Supported PostgreSQL Version
        run: |
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update && sudo apt-get install -y libfontconfig1-dev postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }}
          echo "/usr/lib/postgresql/${{ matrix.pg_version }}/bin" >> $GITHUB_PATH

      - name: Cache pgrx binary
        id: cache-pgrx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ steps.pgrx.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install pgrx
        if: steps.cache-pgrx.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-pgrx --version ${{ steps.pgrx.outputs.version }} --debug

      - name: Initialize pgrx environment
        run: cargo pgrx init --pg${{ matrix.pg_version }}=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config

      - name: Run Rustfmt
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings --no-deps

      - name: Install cargo-machete
        run: cargo install -j $(nproc) cargo-machete --locked --debug

      - name: Install taplo
        run: cargo install -j $(nproc) taplo-cli --version ^0.9 --locked --debug

      - name: Run cargo-machete
        run: cargo machete

      # If you encounter an error, try running 'taplo format' to fix the formatting automatically.
      - name: Check Cargo.toml Formatting
        run: taplo format --check
