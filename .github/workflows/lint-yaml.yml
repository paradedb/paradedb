# workflows/lint-yaml.yml
#
# Lint YAML
# Lint YAML files using Prettier.

name: Lint YAML

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: lint-yaml-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # We use dorny/paths-filter instead of on.pull_request.paths because the
  # built-in paths filter skips the entire workflow — including the required
  # gate job — which causes branch protection to block merges indefinitely.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Detect File Changes
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - "**/*.yml"
              - "**/*.yaml"
              - ".github/workflows/lint-yaml.yml"

  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up NodeJS Environment
        uses: actions/setup-node@v6

      - name: Install Prettier
        run: npm install -g prettier

      - name: Check YAML Formatting
        run: prettier --check "**/*.{yml,yaml}" --ignore-path .prettierignore

      # Guardrail for the required-check gate pattern: asserts that every job
      # in a gated workflow is listed in report-results.needs:, so a future
      # commit that adds a job without updating the gate can't silently bypass
      # branch protection. See .github/scripts/check_gate_needs.py.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check gated workflows declare complete needs lists
        run: python3 .github/scripts/check_gate_needs.py

  # Required for branch protection — GitHub lacks "required when present" for
  # status checks so this gate always runs and reports pass/fail. Standard pattern:
  # https://github.com/astral-sh/ruff/blob/main/.github/workflows/ci.yaml
  # https://github.com/orgs/community/discussions/26251
  report-results:
    name: Report Results
    if: always()
    needs: [detect-changes, lint-yaml]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI Results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
