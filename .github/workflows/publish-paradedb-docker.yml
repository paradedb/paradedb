# workflows/publish-paradedb-docker.yml
#
# Publish ParadeDB (Docker)
# Publish ParadeDB as Docker images for all of our supported PostgreSQL versions to Docker Hub after
# the pg_search .deb has been published to GitHub Releases. Stable releases publish Docker images for
# all of our supported PostgreSQL versions, while beta releases only publish the default PostgreSQL
# version we run as default (currently 18). Once all Docker images are published, notify ORM wrapper
# repositories via repository_dispatch so they can run compatibility checks against the new version.
# This is done in `publish-paradedb-docker.yml` since ORM integration tests are run against our Docker
# image.

name: Publish ParadeDB (Docker)

on:
  workflow_run:
    workflows:
      - Publish pg_search (Debian)
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: "The version to set for the ParadeDB release (e.g. 0.22.0). This publishes the latest commit of the chosen branch and tags it with the provided version."
        required: true
        default: ""
      pg_version:
        description: "The Postgres major version(s) to build ParadeDB for. This needs to be a comma-separated list of integers (e.g. [15] or [15, 16, 17, 18])."
        required: true
        default: "[15, 16, 17, 18]"

concurrency:
  group: publish-paradedb-docker-${{ github.event.workflow_run.head_branch || github.event.inputs.version || github.head_ref || github.ref }}
  cancel-in-progress: true

# Used by actions/attest-build-provenance to sign the builds
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  set-matrix:
    name: Define the PostgreSQL Version Matrix
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'v') && !contains(github.event.workflow_run.head_branch, '-rc.')) }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define the PostgreSQL Version Matrix
        id: set-matrix
        run: |
          REF_NAME="${{ github.event.workflow_run.head_branch || github.event.inputs.version || github.ref_name }}"
          echo "Evaluating ref: $REF_NAME"
          if [[ "$REF_NAME" == *"-"* ]]; then
            echo "GitHub ref contains a dash. Release candidate tag detected; using only PostgreSQL version 18."
            echo "matrix=[18]" >> $GITHUB_OUTPUT
          else
            echo "Regular promotion tag detected; using provided PostgreSQL version(s)."
            echo "matrix=${{ github.event.inputs.pg_version || '[15, 16, 17, 18]' }}" >> $GITHUB_OUTPUT
          fi

  generate-dockerfiles:
    name: Generate Dockerfiles
    runs-on: ubuntu-latest
    needs: set-matrix
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      branch: ${{ steps.generated_branch.outputs.branch }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PARADEDB_GITHUB_APP_ID }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout Git Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Retrieve GitHub Release Version
        id: version
        run: |
          # If this was triggered by publish-pg_search-debian, use the tag from that workflow run.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
            VERSION=${TAG#v}
          # If no workflow_dispatch version is provided, we use workflow tag trigger version.
          elif [ -z "${{ github.event.inputs.version }}" ]; then
            if [[ $GITHUB_REF == refs/tags/v* ]]; then
              VERSION=${GITHUB_REF#refs/tags/v}
              TAG=${GITHUB_REF#refs/tags/}
            else
              # If there is no tag and no provided version, it's a test run and we set a default version
              VERSION="0.0.0"
              TAG="v0.0.0"
            fi
          else
            VERSION=${{ github.event.inputs.version }}
            TAG=v${{ github.event.inputs.version }}
          fi
          echo "GitHub Tag Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Dockerfiles
        run: docker/generate-dockerfiles.sh "${{ steps.version.outputs.version }}"

      - name: Commit Generated Dockerfiles
        id: generated_branch
        run: |
          BRANCH="update-dockerfiles/${{ steps.version.outputs.tag }}"
          git checkout -B "$BRANCH"
          git config user.name "paradedb-github-app[bot]"
          git config user.email "282009505+paradedb-github-app[bot]@users.noreply.github.com"
          git add docker
          if git diff --cached --quiet; then
            echo "No generated Dockerfile changes to commit."
          else
            git commit -m "Generate Dockerfiles for ${{ steps.version.outputs.tag }}"
          fi
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  test-generated-dockerfiles:
    name: Test Generated Dockerfiles
    needs:
      - set-matrix
      - generate-dockerfiles
    uses: ./.github/workflows/test-pg_search-docker.yml
    with:
      ref: ${{ needs.generate-dockerfiles.outputs.branch }}
    secrets: inherit

  publish-paradedb-docker-image:
    name: Publish ParadeDB Docker Image for PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    needs:
      - set-matrix
      - generate-dockerfiles
      - test-generated-dockerfiles
    strategy:
      matrix:
        pg_version: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    env:
      default_pg_version: 18

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.generate-dockerfiles.outputs.branch }}

      - name: Determine if Release Should be Marked as Latest
        id: release_latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag_version="${{ needs.generate-dockerfiles.outputs.version }}"
          latest_tag_version=$(gh release list --jq '.[] | select(.isLatest == true) | .name' --json=name,isLatest | sed 's/^v//')
          echo "Current latest release is $latest_tag_version"
          echo "Current version to be released is $current_tag_version"

          echo ""
          echo "Install semver CLI via npm to compare versions..."
          npm install semver

          echo ""
          echo "Comparing versions to determine if we need to mark this release as latest..."
          echo "We should mark as latest if the current version of the tag triggering this workflow is equal to the latest tag found in GitHub Releases."
          if npx semver -r ">=$latest_tag_version" "$current_tag_version"; then
            echo "is_latest=true"
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false"
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      # Official releases need a single universal image so that the same tag (e.g. `paradedb:latest`)
      # works on both amd64 and arm64 hosts — pulling clients pick the right manifest entry for their
      # arch. That requires producing both arches under one tag, which means cross-compiling at least
      # one of them. Cross-compilation via `docker buildx` (under QEMU emulation) is prohibitively
      # slow for a build this size, so we offload to Depot, which provides native builders on both
      # arches and stitches them into a single multi-arch manifest. (We could eventually replace this
      # with Docker Build Cloud once it supports multiple concurrent builders.)
      - name: Configure Depot CLI
        uses: depot/setup-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The pg_version-tag Docker tag syntax is necessary for our CloudNativePG Helm chart. We only deploy
      # the `latest` and `latest-pg` tags on production releases, not for beta releases.
      - name: Setup Docker Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: paradedb/paradedb
          tags: |
            type=raw,value=${{ matrix.pg_version }}-${{ needs.generate-dockerfiles.outputs.tag }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.tag }}-pg${{ matrix.pg_version }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.version }}-pg${{ matrix.pg_version }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.tag }},enable=${{ matrix.pg_version == env.default_pg_version }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.version }},enable=${{ matrix.pg_version == env.default_pg_version }}
            type=raw,value=latest-pg${{ matrix.pg_version }},enable=${{ steps.release_latest.outputs.is_latest == 'true' && !contains(needs.generate-dockerfiles.outputs.tag, '-rc.') }}
            type=raw,value=latest,enable=${{ matrix.pg_version == env.default_pg_version && steps.release_latest.outputs.is_latest == 'true' && !contains(needs.generate-dockerfiles.outputs.tag, '-rc.') }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image to Docker Hub
        id: build-push
        uses: depot/build-push-action@v1
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: docker/paradedb/${{ matrix.pg_version }}/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          project: ${{ secrets.DEPOT_PROJECT }}
          token: ${{ secrets.DEPOT_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Sign and Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: index.docker.io/paradedb/paradedb
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  notify-orm-repos:
    name: Notify ORM Repos of New Release
    runs-on: ubuntu-latest
    needs: publish-paradedb-docker-image
    if: ${{ !contains(github.event.workflow_run.head_branch || github.event.inputs.version || github.ref, '-rc.') }}
    env:
      # ORM repos to notify on new releases
      ORM_REPOS: |
        paradedb/django-paradedb
        paradedb/rails-paradedb
        paradedb/sqlalchemy-paradedb

    steps:
      - name: Retrieve GitHub Release Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            VERSION="${{ github.event.workflow_run.head_branch }}"
            VERSION=${VERSION#v}
          elif [ -z "${{ github.event.inputs.version }}" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PARADEDB_GITHUB_APP_ID }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            django-paradedb
            rails-paradedb
            sqlalchemy-paradedb

      - name: Notify ORM Repos of New Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          while IFS= read -r repo; do
            repo=$(echo "$repo" | xargs)
            [ -z "$repo" ] && continue
            echo "Dispatching to $repo..."
            gh api "repos/$repo/dispatches" \
              --field event_type=paradedb-release \
              --field "client_payload[version]=${{ steps.version.outputs.version }}"
          done <<< "$ORM_REPOS"
