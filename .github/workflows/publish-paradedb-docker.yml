# workflows/publish-paradedb-docker.yml
#
# Publish ParadeDB (Docker)
# Publish ParadeDB as Docker images for all of our supported PostgreSQL versions to Docker Hub after
# the pg_search .deb has been published to GitHub Releases. Stable releases publish Docker images for
# all of our supported PostgreSQL versions, while beta releases only publish the default PostgreSQL
# version we run as default (currently 18). This workflow also publishes the non-runnable
# extension image for Postgres 18+ deployments that mount Postgres extension images.
# Once the runnable Docker images are published, notify ORM wrapper repositories via repository_dispatch
# so they can run compatibility checks against the new version. This is done in
# `publish-paradedb-docker.yml` since ORM integration tests are run against our Docker image.
#
# This workflow is dispatched by `publish-pg_search-debian.yml` (once the Debian binaries are published) via
# `workflow_dispatch` pinned to the release ref so that it runs on the same commit as the other deploy jobs.

name: Publish ParadeDB (Docker)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to set for the ParadeDB release (e.g. 0.22.0). This publishes the latest commit of the chosen branch and tags it with the provided version."
        required: true
        default: ""
      pg_version:
        description: "The Postgres major version(s) to build ParadeDB for. This needs to be a comma-separated list of integers (e.g. [15] or [15, 16, 17, 18]). Beta (-rc.) releases always resolve to [18] regardless of this value."
        required: false
        default: "[15, 16, 17, 18]"

concurrency:
  group: publish-paradedb-docker-${{ github.event.inputs.version || github.ref }}
  cancel-in-progress: true

# id-token: write lets cosign sign and attest the images keylessly via Sigstore.
permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  set-matrix:
    name: Define the PostgreSQL Version Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define the PostgreSQL Version Matrix
        id: set-matrix
        run: |
          REF_NAME="${{ github.event.inputs.version || github.ref_name }}"
          echo "Evaluating ref: $REF_NAME"
          if [[ "$REF_NAME" == *"-"* ]]; then
            echo "Pre-release version (contains a dash, e.g. a beta -rc. tag); publishing PostgreSQL 18 only."
            echo "matrix=[18]" >> $GITHUB_OUTPUT
          else
            echo "Regular promotion tag detected; using provided PostgreSQL version(s)."
            echo "matrix=${{ github.event.inputs.pg_version || '[15, 16, 17, 18]' }}" >> $GITHUB_OUTPUT
          fi

  generate-dockerfiles:
    name: Generate Dockerfiles
    runs-on: ubuntu-latest
    needs: set-matrix
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_branch: ${{ steps.version.outputs.release_branch }}
      is_latest: ${{ steps.release_latest.outputs.is_latest }}
      branch: ${{ steps.generated_branch.outputs.branch }}
      has_changes: ${{ steps.generated_branch.outputs.has_changes }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PARADEDB_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Retrieve GitHub Release Version
        id: version
        run: |
          # If no workflow_dispatch version is provided, we use workflow tag trigger version.
          if [ -z "${{ github.event.inputs.version }}" ]; then
            if [[ $GITHUB_REF == refs/tags/v* ]]; then
              VERSION=${GITHUB_REF#refs/tags/v}
              TAG=${GITHUB_REF#refs/tags/}
            else
              # If there is no tag and no provided version, it's a test run and we set a default version
              VERSION="0.0.0"
              TAG="v0.0.0"
            fi
          else
            VERSION=${{ github.event.inputs.version }}
            TAG=v${{ github.event.inputs.version }}
          fi
          RELEASE_VERSION=${VERSION%%-*}
          IFS=. read -r MAJOR MINOR _ <<< "$RELEASE_VERSION"
          RELEASE_BRANCH="$MAJOR.$MINOR.x"
          echo "GitHub Tag Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Determine if Release Should be Marked as Latest
        id: release_latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag_version="${{ steps.version.outputs.version }}"
          latest_tag_version=$(gh release list --jq '.[] | select(.isLatest == true) | .name' --json=name,isLatest | sed 's/^v//')
          echo "Current latest release is $latest_tag_version"
          echo "Current version to be released is $current_tag_version"

          echo ""
          echo "Install semver CLI via npm to compare versions..."
          npm install semver

          echo ""
          echo "Comparing versions to determine if we need to mark this release as latest..."
          echo "We should mark as latest if the current version of the tag triggering this workflow is equal to the latest tag found in GitHub Releases."
          if npx semver -r ">=$latest_tag_version" "$current_tag_version"; then
            echo "is_latest=true"
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false"
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      # Only generate the PG majors we're publishing this run. For beta (`-rc.`) releases the matrix
      # is [18], and only the PG 18 .deb are published.
      - name: Generate Dockerfiles
        run: |
          PG_MAJORS=$(echo '${{ needs.set-matrix.outputs.matrix }}' | jq -r 'map(tostring) | join(" ")')
          docker/generate-dockerfiles.sh "${{ steps.version.outputs.version }}" "$PG_MAJORS"

      - name: Commit Generated Dockerfiles
        id: generated_branch
        run: |
          git add docker
          if git diff --cached --quiet; then
            echo "No generated Dockerfile changes to commit; building from the release commit."
            echo "branch=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            BRANCH="update-dockerfiles/${{ steps.version.outputs.tag }}"
            git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
            git checkout -B "$BRANCH"
            git config user.name "paradedb-github-app[bot]"
            git config user.email "282009505+paradedb-github-app[bot]@users.noreply.github.com"
            git commit -m "Generate Dockerfiles for ${{ steps.version.outputs.tag }}"
            git push --force-with-lease origin "$BRANCH"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  test-generated-dockerfiles:
    name: Test Generated Dockerfiles
    needs:
      - set-matrix
      - generate-dockerfiles
    uses: ./.github/workflows/test-pg_search-docker.yml
    with:
      ref: ${{ needs.generate-dockerfiles.outputs.branch }}
    secrets: inherit

  publish-paradedb-docker-image:
    name: Publish ParadeDB Docker Image for PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    needs:
      - set-matrix
      - generate-dockerfiles
      - test-generated-dockerfiles
    strategy:
      matrix:
        pg_version: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    env:
      default_pg_version: 18

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.generate-dockerfiles.outputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The pg_version-tag Docker tag syntax is necessary for our CloudNativePG Helm chart. We only deploy
      # the `latest`, `latest-pg`, and `pg` tags on production releases, not for beta releases.
      - name: Setup Docker Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: paradedb/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ matrix.pg_version }}-${{ needs.generate-dockerfiles.outputs.tag }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.tag }}-pg${{ matrix.pg_version }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.version }}-pg${{ matrix.pg_version }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.tag }},enable=${{ matrix.pg_version == env.default_pg_version }}
            type=raw,value=${{ needs.generate-dockerfiles.outputs.version }},enable=${{ matrix.pg_version == env.default_pg_version }}
            type=raw,value=latest-pg${{ matrix.pg_version }},enable=${{ needs.generate-dockerfiles.outputs.is_latest == 'true' && !contains(needs.generate-dockerfiles.outputs.tag, '-rc.') }}
            type=raw,value=pg${{ matrix.pg_version }},enable=${{ needs.generate-dockerfiles.outputs.is_latest == 'true' && !contains(needs.generate-dockerfiles.outputs.tag, '-rc.') }}
            type=raw,value=latest,enable=${{ matrix.pg_version == env.default_pg_version && needs.generate-dockerfiles.outputs.is_latest == 'true' && !contains(needs.generate-dockerfiles.outputs.tag, '-rc.') }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image to Docker Hub
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.paradedb-${{ matrix.pg_version }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}

      # Fail the release on fixable CRITICAL/HIGH CVEs in the image before we sign
      # or publish it. ignore-unfixed drops advisories with no upstream fix.
      - name: Scan Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: index.docker.io/paradedb/${{ github.event.repository.name }}@${{ steps.build-push.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      # Keyless Sigstore signature over the image digest. Works without GitHub Enterprise
      - name: Sign Image with Cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign --recursive "index.docker.io/paradedb/${{ github.event.repository.name }}@${{ steps.build-push.outputs.digest }}"

      # Signed SLSA provenance over the image digest via Sigstore. Works without GitHub Enterprise.
      - name: Attest Build Provenance with Cosign (keyless)
        env:
          COSIGN_YES: "true"
          IMAGE_REF: index.docker.io/paradedb/${{ github.event.repository.name }}@${{ steps.build-push.outputs.digest }}
          BUILDER_ID: ${{ github.server_url }}/${{ github.workflow_ref }}
          SOURCE_URI: git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          jq -n \
            --arg builder "$BUILDER_ID" \
            --arg uri "$SOURCE_URI" \
            --arg sha "$SOURCE_SHA" \
            --arg runid "$RUN_ID" \
            '{
              builder: { id: $builder },
              buildType: "https://github.com/actions/runner",
              invocation: {
                configSource: {
                  uri: $uri,
                  digest: { sha1: $sha },
                  entryPoint: ".github/workflows/publish-paradedb-docker.yml"
                }
              },
              metadata: { buildInvocationId: $runid },
              materials: [{ uri: $uri, digest: { sha1: $sha } }]
            }' > provenance.json
          cosign attest --yes --type slsaprovenance --predicate provenance.json "$IMAGE_REF"

  # Beta (`-rc.`) releases publish only the runnable PG 18 image, not the mountable extension image.
  publish-extension-image:
    name: Publish ParadeDB Extension Image for PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    needs:
      - generate-dockerfiles
      - test-generated-dockerfiles
    if: ${{ !contains(needs.generate-dockerfiles.outputs.version, '-rc.') }}
    strategy:
      matrix:
        # Mounted extension images require PostgreSQL 18+ because
        # extension_control_path was introduced in PG 18. Older PG majors cannot
        # see a mounted /share/extension directory.
        pg_version: [18]
    env:
      image_name: paradedb/${{ github.event.repository.name }}-extension
      image_os: trixie

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.generate-dockerfiles.outputs.branch }}

      - name: Resolve pg_search .deb Checksums
        id: checksums
        env:
          PG_VERSION: ${{ matrix.pg_version }}
          PG_SEARCH_VERSION: ${{ needs.generate-dockerfiles.outputs.version }}
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          fetch_checksum() {
            local arch="$1"
            local release_asset_name="postgresql-${PG_VERSION}-pg-search_${PG_SEARCH_VERSION}-1PARADEDB-trixie_${arch}.deb"
            local deb="${tmp_dir}/${release_asset_name}"

            echo "Fetching ${release_asset_name}" >&2
            curl -fsSL -o "$deb" "https://github.com/paradedb/paradedb/releases/download/v${PG_SEARCH_VERSION}/${release_asset_name}"
            sha256sum "$deb" | awk '{ print $1 }'
          }

          echo "amd64=$(fetch_checksum amd64)" >> "$GITHUB_OUTPUT"
          echo "arm64=$(fetch_checksum arm64)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup Docker Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.image_name }}
          # Extension payloads are version-pinned to a Postgres major, mirroring the
          # cloudnative-pg/postgres-extensions-containers `<version>-<pg-major>-<distro>`
          # convention.
          tags: |
            type=raw,value=${{ needs.generate-dockerfiles.outputs.version }}-${{ matrix.pg_version }}-${{ env.image_os }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image to Docker Hub
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.extension
          build-args: |
            BASE=ghcr.io/cloudnative-pg/postgresql:${{ matrix.pg_version }}-minimal-trixie
            PG_VERSION_MAJOR=${{ matrix.pg_version }}
            PG_SEARCH_VERSION=${{ needs.generate-dockerfiles.outputs.version }}
            PG_SEARCH_DEB_AMD64_SHA256=${{ steps.checksums.outputs.amd64 }}
            PG_SEARCH_DEB_ARM64_SHA256=${{ steps.checksums.outputs.arm64 }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}

      # Fail the release on fixable CRITICAL/HIGH CVEs in the image before we sign
      # or publish it. ignore-unfixed drops advisories with no upstream fix.
      - name: Scan Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: index.docker.io/${{ env.image_name }}@${{ steps.build-push.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      # Keyless Sigstore signature over the image digest. Works without GitHub Enterprise
      - name: Sign Image with Cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign --recursive "index.docker.io/${{ env.image_name }}@${{ steps.build-push.outputs.digest }}"

      # Signed SLSA provenance over the image digest via Sigstore. Works without GitHub Enterprise.
      - name: Attest Build Provenance with Cosign (keyless)
        env:
          COSIGN_YES: "true"
          IMAGE_REF: index.docker.io/${{ env.image_name }}@${{ steps.build-push.outputs.digest }}
          BUILDER_ID: ${{ github.server_url }}/${{ github.workflow_ref }}
          SOURCE_URI: git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          jq -n \
            --arg builder "$BUILDER_ID" \
            --arg uri "$SOURCE_URI" \
            --arg sha "$SOURCE_SHA" \
            --arg runid "$RUN_ID" \
            '{
              builder: { id: $builder },
              buildType: "https://github.com/actions/runner",
              invocation: {
                configSource: {
                  uri: $uri,
                  digest: { sha1: $sha },
                  entryPoint: ".github/workflows/publish-paradedb-docker.yml"
                }
              },
              metadata: { buildInvocationId: $runid },
              materials: [{ uri: $uri, digest: { sha1: $sha } }]
            }' > provenance.json
          cosign attest --yes --type slsaprovenance --predicate provenance.json "$IMAGE_REF"

  # Skip for beta (`-rc.`) releases, since we don't want to open Dockerfile-update PRs for prereleases
  open-dockerfile-prs:
    name: Open Dockerfile Update PRs
    runs-on: ubuntu-latest
    needs:
      - generate-dockerfiles
      - publish-paradedb-docker-image
    if: ${{ needs.generate-dockerfiles.outputs.has_changes == 'true' && !contains(needs.generate-dockerfiles.outputs.version, '-rc.') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PARADEDB_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.generate-dockerfiles.outputs.branch }}
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}

      - name: Open Release Branch PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ needs.generate-dockerfiles.outputs.branch }}"
          BASE="${{ needs.generate-dockerfiles.outputs.release_branch }}"

          PR=$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number // ""')
          if [ -n "$PR" ]; then
            echo "Release branch PR already exists: #$PR"
          else
            gh pr create --base "$BASE" --head "$BRANCH" --title "chore: Generate Dockerfiles for ${{ needs.generate-dockerfiles.outputs.tag }}" --body "Updates generated Dockerfiles for ${{ needs.generate-dockerfiles.outputs.tag }} after the Docker images were published."
          fi

      - name: Open Main PR
        if: ${{ needs.generate-dockerfiles.outputs.is_latest == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ needs.generate-dockerfiles.outputs.tag }}"
          BRANCH="update-dockerfiles/${TAG}-main"
          COMMIT_SHA=$(git rev-parse HEAD)

          git config user.name "paradedb-github-app[bot]"
          git config user.email "282009505+paradedb-github-app[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          git checkout -B "$BRANCH" origin/main
          git cherry-pick --no-commit "$COMMIT_SHA"
          git commit -m "Generate Dockerfiles for $TAG"
          git push --force-with-lease origin "$BRANCH"

          PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // ""')
          if [ -n "$PR" ]; then
            echo "Main PR already exists: #$PR"
          else
            gh pr create --base main --head "$BRANCH" --title "chore: Generate Dockerfiles for $TAG" --body "Updates generated Dockerfiles for $TAG after the Docker images were published." --label "Do Not Cherry Pick"
          fi

  notify-orm-repos:
    name: Notify ORM Repos of New Release
    runs-on: ubuntu-latest
    needs: publish-paradedb-docker-image
    if: ${{ !contains(github.event.inputs.version || github.ref, '-rc.') }}
    env:
      # ORM repos to notify on new releases
      ORM_REPOS: |
        paradedb/drizzle-paradedb
        paradedb/django-paradedb
        paradedb/sqlalchemy-paradedb
        paradedb/rails-paradedb
        paradedb/efcore-paradedb

    steps:
      - name: Retrieve GitHub Release Version
        id: version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PARADEDB_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            drizzle-paradedb
            django-paradedb
            sqlalchemy-paradedb
            rails-paradedb
            efcore-paradedb

      - name: Notify ORM Repos of New Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Attempt every repo even if one fails (e.g. the ParadeDB GitHub App is
          # not installed on it), so a single misconfigured repo doesn't block the
          # rest. Collect failures and fail the step at the end, which trips the
          # notify-slack-on-failure job.
          failed=()
          while IFS= read -r repo; do
            repo=$(echo "$repo" | xargs)
            [ -z "$repo" ] && continue
            echo "Dispatching to $repo..."
            if ! gh api "repos/$repo/dispatches" \
              --field event_type=paradedb-release \
              --field "client_payload[version]=${{ steps.version.outputs.version }}"; then
              echo "::error::Failed to dispatch paradedb-release event to $repo"
              failed+=("$repo")
            fi
          done <<< "$ORM_REPOS"

          if [ ${#failed[@]} -ne 0 ]; then
            echo "Failed to notify the following ORM repos: ${failed[*]}"
            exit 1
          fi

  # Single failure sink for the whole workflow: if any publishing job (including
  # the regular image, the extension image, Dockerfile generation/testing, or the
  # ORM dispatch) fails, alert Slack once with a link to the run.
  notify-slack-on-failure:
    name: Notify Slack on Failure
    runs-on: ubuntu-latest
    needs:
      - set-matrix
      - generate-dockerfiles
      - test-generated-dockerfiles
      - publish-paradedb-docker-image
      - publish-extension-image
      - open-dockerfile-prs
      - notify-orm-repos
    if: ${{ always() && (needs.set-matrix.result == 'failure' || needs.generate-dockerfiles.result == 'failure' || needs.test-generated-dockerfiles.result == 'failure' || needs.publish-paradedb-docker-image.result == 'failure' || needs.publish-extension-image.result == 'failure' || needs.open-dockerfile-prs.result == 'failure' || needs.notify-orm-repos.result == 'failure') }}
    steps:
      - name: Notify Slack on Failure
        run: |
          GITHUB_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="<!here> \`publish-paradedb-docker\` workflow failed in \`${{ github.repository }}\` on branch \`${{ github.ref_name }}\` -- investigate immediately! GitHub Action Logs: ${GITHUB_RUN_URL}"
          curl -X POST -H 'Content-type: application/json' -d "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_GITHUB_CHANNEL_WEBHOOK_URL }}
