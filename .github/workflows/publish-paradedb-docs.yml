# workflows/publish-paradedb-docs.yml
#
# Publish ParadeDB (Docs)
# Build and publish the documentation stored in /docs to our Mintlify documentation
# site. This workflow is triggered on creation of a GitHub Tag, but beta releases get
# filtered out by the `if` condition of the job.

name: Publish ParadeDB (Docs)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-paradedb-docs:
    name: Publish Docs to Mintlify
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-rc.') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Publish Docs to Mintlify
        run: |
          # Capture the response body and HTTP status separately so a failed deploy
          # surfaces Mintlify's error message instead of just an opaque curl exit code.
          http_code=$(curl -sS -o response.txt -w "%{http_code}" -X POST \
            https://api.mintlify.com/v1/project/update/${{ secrets.MINTLIFY_PROJECT_ID }} \
            -H "Authorization: Bearer ${{ secrets.MINTLIFY_API_KEY }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: ${http_code}"
          echo "Response body:"
          cat response.txt

          # Fail the step on any non-2xx response.
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Mintlify deploy failed with HTTP ${http_code}"
            exit 1
          fi

      - name: Notify Slack on Failure
        if: failure()
        run: |
          GITHUB_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="<!here> \`publish-paradedb-docs\` workflow failed in \`${{ github.repository }}\` on branch \`${{ github.ref_name }}\` -- investigate immediately! GitHub Action Logs: ${GITHUB_RUN_URL}"
          curl -X POST -H 'Content-type: application/json' -d "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_GITHUB_CHANNEL_WEBHOOK_URL }}
