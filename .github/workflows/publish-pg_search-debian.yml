# workflows/publish-pg_search-debian.yml
#
# Publish pg_search (Debian)
# Build and publish the pg_search extension as .deb to GitHub Releases. This workflow is
# triggered on creation of a GitHub Tag. Beta releases skip most of the matrix via a
# per-step guard (see the `Determine Whether to Build This Row` step).

name: Publish pg_search (Debian)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "The version to set for the pg_search release (e.g. 0.22.0). This publishes the latest commit of the chosen branch and uploads it to the pre-existing GitHub Release of the provided version."
        required: true
        default: ""

concurrency:
  group: publish-pg_search-debian-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# id-token: write lets cosign sign the builds keylessly via Sigstore.
permissions:
  contents: write
  id-token: write

jobs:
  # Stable releases build the full matrix. Beta releases (`-rc.` tags) build only what the PG 18
  # Docker image needs (the Debian 13 (Trixie) .deb for both arches).
  publish-pg_search-debian:
    name: Publish pg_search for PostgreSQL ${{ matrix.pg_version }} on ${{ matrix.name }} ${{ matrix.arch }}
    # Compute-optimized c-family — Rust release build inside matrix.image container is CPU-bound.
    # See https://runs-on.com/configuration/job-labels/ — runs in us-east-1.
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=${{ matrix.runner_family }}
      - cpu=${{ matrix.cpu }}
      - ram=${{ matrix.ram }}
      - image=${{ matrix.runner_image }}
    container:
      image: ${{ matrix.image }}
    strategy:
      matrix:
        include:
          # Debian 12 (Bookworm)
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:12-slim
            pg_version: 15
            arch: amd64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:12-slim
            pg_version: 15
            arch: arm64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:12-slim
            pg_version: 16
            arch: amd64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:12-slim
            pg_version: 16
            arch: arm64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:12-slim
            pg_version: 17
            arch: amd64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:12-slim
            pg_version: 17
            arch: arm64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:12-slim
            pg_version: 18
            arch: amd64
          - name: Debian 12 (Bookworm)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:12-slim
            pg_version: 18
            arch: arm64
          # Debian 13 (Trixie)
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:13-slim
            pg_version: 15
            arch: amd64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:13-slim
            pg_version: 15
            arch: arm64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:13-slim
            pg_version: 16
            arch: amd64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:13-slim
            pg_version: 16
            arch: arm64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:13-slim
            pg_version: 17
            arch: amd64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:13-slim
            pg_version: 17
            arch: arm64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7a+c7i
            runner_image: ubuntu24-full-x64
            image: debian:13-slim
            pg_version: 18
            arch: amd64
          - name: Debian 13 (Trixie)
            cpu: 8
            ram: 16
            runner_family: c7g+c8g
            runner_image: ubuntu24-full-arm64
            image: debian:13-slim
            pg_version: 18
            arch: arm64

    steps:
      # A job-level `if` cannot read the `matrix` context, so beta filtering happens here, per step:
      # stable releases build every row; beta (`-rc.`) releases build only the Debian 13 (Trixie)
      # PG 18 .deb (both arches) that the PG 18 Docker image installs.
      - name: Determine Whether to Build This Row
        id: guard
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != *-rc.* || ( "${{ matrix.pg_version }}" == "18" && "${{ matrix.name }}" == "Debian 13 (Trixie)" ) ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        if: steps.guard.outputs.build == 'true'
        run: DEBIAN_FRONTEND=noninteractive apt-get update && apt-get install -y sudo wget git ca-certificates curl gnupg gpg lsb-release pkg-config libssl-dev jq gettext-base

      - name: Checkout Git Repository
        if: steps.guard.outputs.build == 'true'
        uses: actions/checkout@v7

      # Used to upload the release to GitHub Releases
      - name: Install GitHub CLI
        if: steps.guard.outputs.build == 'true'
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          DEBIAN_FRONTEND=noninteractive apt-get update && apt-get install -y gh
          gh --version

      - name: Install Rust
        if: steps.guard.outputs.build == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false # Disable cache on publish workflows
          rustflags: "" # Use .cargo/config.toml target-cpu flags

      # Note: We need to specify bash as the shell to ensure that it doesn't default to /bin/sh on Debian, since
      # /bin/sh does not support the `[[` syntax.
      - name: Retrieve OS & GitHub Tag Versions
        if: steps.guard.outputs.build == 'true'
        id: version
        shell: bash
        run: |
          # If no workflow_dispatch version is provided, we use workflow tag trigger version
          if [ -z "${{ github.event.inputs.version }}" ]; then
            if [[ $GITHUB_REF == refs/tags/v* ]]; then
              VERSION=${GITHUB_REF#refs/tags/v}
            else
              # If there is no tag and no provided version, it's a test run and we set a default version
              VERSION="0.0.0"
            fi
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "GitHub Tag Version: $VERSION"
          echo "tag_version=$VERSION" >> $GITHUB_OUTPUT

          OS_VERSION="$(lsb_release -cs)"
          echo "OS Version: $OS_VERSION"
          echo "os_version=$OS_VERSION" >> $GITHUB_OUTPUT

      - name: Install & Configure Supported PostgreSQL Version
        if: steps.guard.outputs.build == 'true'
        run: |
          # Create keyrings dir (works on Debian/Ubuntu)
          sudo install -d -m 0755 /usr/share/keyrings

          # Download PostgreSQL signing key & add PostgreSQL APT repository with signed-by
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /usr/share/keyrings/postgresql.asc > /dev/null
          sudo sh -c 'echo "deb [signed-by=/usr/share/keyrings/postgresql.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'

          # Install PostgreSQL + build tooling
          DEBIAN_FRONTEND=noninteractive sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }} debhelper devscripts dput gnupg

          # Add Postgres bin dir to PATH for subsequent steps
          echo "/usr/lib/postgresql/${{ matrix.pg_version }}/bin" >> "$GITHUB_PATH"

      - name: Extract pgrx Version
        if: steps.guard.outputs.build == 'true'
        id: pgrx
        run: echo version=$(sed -nE 's/^pgrx = "=?([^"]+)"$/\1/p' Cargo.toml) >> $GITHUB_OUTPUT

      - name: Cache pgrx binary
        if: steps.guard.outputs.build == 'true'
        id: cache-pgrx
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ steps.pgrx.outputs.version }}-${{ runner.os }}-${{ runner.arch }}-debian-${{ matrix.image }}

      - name: Install pgrx
        if: ${{ steps.guard.outputs.build == 'true' && steps.cache-pgrx.outputs.cache-hit != 'true' }}
        run: cargo install --locked cargo-pgrx --version ${{ steps.pgrx.outputs.version }} --debug

      - name: Initialize pgrx environment
        if: steps.guard.outputs.build == 'true'
        working-directory: pg_search/
        run: |
          PG_CONFIG_PATH="/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config"
          cargo pgrx init --pg${{ matrix.pg_version }}=$PG_CONFIG_PATH

      - name: Package pg_search Extension with pgrx
        if: steps.guard.outputs.build == 'true'
        working-directory: pg_search/
        run: |
          PG_CONFIG_PATH="/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config"
          cargo pgrx package --pg-config $PG_CONFIG_PATH

      - name: Create .deb Package
        if: steps.guard.outputs.build == 'true'
        run: |
          # Create installable package
          mkdir archive
          cp `find target/release -type f -name "pg_search*"` archive
          package_dir=pg_search-${{ steps.version.outputs.tag_version }}-${{ steps.version.outputs.os_version }}-${{ matrix.arch }}-pg${{ matrix.pg_version }}

          # Copy files into directory structure
          mkdir -p ${package_dir}/usr/lib/postgresql/${{ matrix.pg_version }}/lib
          mkdir -p ${package_dir}/usr/share/postgresql/${{ matrix.pg_version}}/extension
          cp archive/*.so ${package_dir}/usr/lib/postgresql/${{ matrix.pg_version }}/lib
          cp archive/*.control ${package_dir}/usr/share/postgresql/${{ matrix.pg_version }}/extension
          cp archive/*.sql ${package_dir}/usr/share/postgresql/${{ matrix.pg_version }}/extension

          # Create control file (package name cannot have underscore)
          mkdir -p ${package_dir}/DEBIAN
          touch ${package_dir}/DEBIAN/control
          deb_version=${{ steps.version.outputs.tag_version }}
          CONTROL_FILE="${package_dir}/DEBIAN/control"
          echo 'Package: postgresql-${{ matrix.pg_version }}-pg-search' >> $CONTROL_FILE
          echo 'Version:' ${deb_version} >> $CONTROL_FILE
          echo 'Section: database' >> $CONTROL_FILE
          echo 'Priority: optional' >> $CONTROL_FILE
          echo 'Architecture: ${{ matrix.arch }}' >> $CONTROL_FILE
          echo 'Depends: postgresql-${{ matrix.pg_version }}' >> $CONTROL_FILE
          echo 'Maintainer: ParadeDB <support@paradedb.com>' >> $CONTROL_FILE
          echo 'Description: Postgres for Search and Analytics' >> $CONTROL_FILE

          # Copyright file (Debian Policy §12.5). Also consumed by the
          # CloudNativePG postgres-extensions-containers Dockerfiles, which
          # COPY /usr/share/doc/<pkg>/copyright into the extension image's
          # /licenses/ tree.
          doc_dir=${package_dir}/usr/share/doc/postgresql-${{ matrix.pg_version }}-pg-search
          mkdir -p ${doc_dir}
          cat > ${doc_dir}/copyright <<'EOF'
          Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
          Upstream-Name: pg_search
          Upstream-Contact: ParadeDB <support@paradedb.com>
          Source: https://github.com/paradedb/paradedb

          Files: *
          Copyright: ParadeDB <support@paradedb.com>
          License: AGPL-3.0-or-later
           The full license text is in this package at LICENSE,
           and online at https://www.gnu.org/licenses/agpl-3.0.txt
          EOF
          cp LICENSE ${doc_dir}/LICENSE

          # Create .deb package
          sudo chown -R root:root ${package_dir}
          sudo chmod -R 755 ${package_dir}
          sudo dpkg-deb -Zxz --build --root-owner-group ${package_dir}

      - name: Install Cosign
        if: steps.guard.outputs.build == 'true'
        uses: sigstore/cosign-installer@v4.1.2

      # Keyless Sigstore signature over the .deb. Works without GitHub Enterprise;
      # the .cosign.bundle is uploaded next to the package for `cosign verify-blob`.
      - name: Sign .deb with Cosign (keyless)
        if: steps.guard.outputs.build == 'true'
        shell: bash
        env:
          COSIGN_YES: "true"
          DEB: ./pg_search-${{ steps.version.outputs.tag_version }}-${{ steps.version.outputs.os_version }}-${{ matrix.arch }}-pg${{ matrix.pg_version }}.deb
        run: cosign sign-blob --yes --bundle "${DEB}.cosign.bundle" "$DEB"

      # Note: We need to specify bash as the shell to ensure that it doesn't default to /bin/sh on Debian, which
      # is not capable of parsing certain control characters
      - name: Retrieve GitHub Release Upload URL
        if: steps.guard.outputs.build == 'true'
        id: upload_url
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(gh api \
            -H "Authorization: token $GH_TOKEN" \
            /repos/${{ github.repository }}/releases/tags/v${{ steps.version.outputs.tag_version }})
          echo "REST API Response: $RESPONSE"

          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url' | sed 's/{.*}//')
          echo "GitHub Release Upload URL is: $UPLOAD_URL"
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT

      - name: Upload pg_search .deb to GitHub Release
        if: steps.guard.outputs.build == 'true'
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_url: ${{ steps.upload_url.outputs.upload_url }}
          asset_path: ./pg_search-${{ steps.version.outputs.tag_version }}-${{ steps.version.outputs.os_version }}-${{ matrix.arch }}-pg${{ matrix.pg_version }}.deb
          asset_name: postgresql-${{ matrix.pg_version }}-pg-search_${{ steps.version.outputs.tag_version }}-1PARADEDB-${{ steps.version.outputs.os_version }}_${{ matrix.arch }}.deb
          overwrite: true

      - name: Upload pg_search .deb Cosign Bundle to GitHub Release
        if: steps.guard.outputs.build == 'true'
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_url: ${{ steps.upload_url.outputs.upload_url }}
          asset_path: ./pg_search-${{ steps.version.outputs.tag_version }}-${{ steps.version.outputs.os_version }}-${{ matrix.arch }}-pg${{ matrix.pg_version }}.deb.cosign.bundle
          asset_name: postgresql-${{ matrix.pg_version }}-pg-search_${{ steps.version.outputs.tag_version }}-1PARADEDB-${{ steps.version.outputs.os_version }}_${{ matrix.arch }}.deb.cosign.bundle
          overwrite: true

      - name: Notify Slack on Failure
        if: ${{ failure() && steps.guard.outputs.build == 'true' }}
        run: |
          GITHUB_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="<!here> \`publish-pg_search-debian\` workflow failed in \`${{ github.repository }}\` on branch \`${{ github.ref_name }}\` -- investigate immediately! GitHub Action Logs: ${GITHUB_RUN_URL}"
          curl -X POST -H 'Content-type: application/json' -d "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_GITHUB_CHANNEL_WEBHOOK_URL }}

  # Once the Debian packages are published, kick off the ParadeDB Docker publish. The Docker
  # image publishing runs after Debian since it installs the Debian packages to avoid needing to build
  # them from source again.
  trigger-docker-publish:
    name: Trigger ParadeDB Docker Publish
    runs-on: ubuntu-latest
    needs: publish-pg_search-debian
    # Only on release-tag pushes, so a manual .deb rebuild doesn't also republish the Docker images.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PARADEDB_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}

      # This job only runs on a version-tag push, so the version is always the tag.
      - name: Resolve Release Version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Dispatch ParadeDB Docker Publish on This Release Ref
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run publish-paradedb-docker.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f version="${{ steps.version.outputs.version }}"
