# workflows/publish-pg_search-schema.yml
#
# Publish pg_search Schema
# Generates the full pg_search SQL schema via `cargo pgrx schema` and uploads it as a
# release asset.

name: Publish pg_search Schema

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "The version to generate the schema for (e.g. 0.22.0). Defaults to the current tag."
        required: false
        default: ""

concurrency:
  group: publish-pg_search-schema-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-pg_search-schema:
    name: Publish pg_search Schema
    runs-on: ubicloud-standard-8-ubuntu-2404
    if: ${{ !contains(github.ref, '-rc.') }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    env:
      pg_version: 18

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Extract pgrx Version
        id: pgrx
        run: echo "version=$(sed -nE 's/^pgrx = "=?([^"]+)"$/\1/p' Cargo.toml)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: "" # Use .cargo/config.toml target-cpu flags

      # Do NOT add hashFiles('**/Cargo.lock') or arch to shared-key.
      # See test-pg_search.yml for rationale.
      - name: Install Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "rust-cache"
          shared-key: pg${{ env.pg_version }}
          cache-targets: true
          cache-all-crates: true

      - name: Install & Configure PostgreSQL ${{ env.pg_version }}
        run: |
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update && sudo apt-get install -y postgresql-${{ env.pg_version }} postgresql-server-dev-${{ env.pg_version }}
          echo "/usr/lib/postgresql/${{ env.pg_version }}/bin" >> $GITHUB_PATH

      - name: Cache pgrx binary
        id: cache-pgrx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ steps.pgrx.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install pgrx
        if: steps.cache-pgrx.outputs.cache-hit != 'true'
        run: cargo install -j $(nproc) --locked cargo-pgrx --version ${{ steps.pgrx.outputs.version }} --debug

      - name: Initialize pgrx environment
        run: cargo pgrx init "--pg${{ env.pg_version }}=/usr/lib/postgresql/${{ env.pg_version }}/bin/pg_config"

      - name: Generate pg_search Schema
        run: cargo pgrx schema -p pg_search pg${{ env.pg_version }} > pg_search.schema.sql

      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT
          fi

      - name: Upload Schema to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PARADEDB_BOT_GITHUB_TOKEN }}
        run: gh release upload v${{ steps.version.outputs.version }} pg_search.schema.sql --clobber

      - name: Notify Slack on Failure
        if: failure()
        run: |
          GITHUB_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="<!here> \`publish-pg_search-schema\` workflow failed in \`${{ github.repository }}\` on branch \`${{ github.ref_name }}\` -- investigate immediately! GitHub Action Logs: ${GITHUB_RUN_URL}"
          curl -X POST -H 'Content-type: application/json' -d "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_GITHUB_CHANNEL_WEBHOOK_URL }}
