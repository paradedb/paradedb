# workflows/publish-stressgres-docker.yml
#
# Publish Stressgres (Docker)
# Publish Stressgres as a Docker image to Docker Hub. The workflow builds and publishes
# the last commit from the triggering branch and tags the image with the SHA.

name: Publish Stressgres (Docker)

on:
  workflow_dispatch:

concurrency:
  group: publish-stressgres-docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish-stressgres-docker:
    name: Publish Stressgres Docker Image to Docker Hub
    runs-on:
      # General-purpose m-family — Docker buildx is RAM-heavy.
      # See https://runs-on.com/configuration/job-labels/ — runs in us-east-1.
      - runs-on=${{ github.run_id }}
      - family=m7a+m7i
      - cpu=8
      - ram=32
      - image=ubuntu24-full-x64

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup Docker Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: paradedb/stressgres
          tags: |
            type=raw,value=${{ github.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.stressgres
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
