# workflows/test-docs.yml
#
# Test Docs
# Test our documentation for broken links via Mintlify.

name: Test Docs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - 0.*.x # Release branches
      - moe/** # Temporary: trigger CI on stacked PR chain
    paths:
      - ".github/workflows/test-docs.yml"
      - ".github/scripts/**"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: test-docs-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-docs:
    name: Test Docs for Broken Links, SEO Issues, and Code Snippets That error
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Test Docs for Broken Links
        working-directory: docs/
        run: |
          output=$(mintlify broken-links 2>&1) || true
          echo "$output"
          if [[ "$output" == *"success no broken links found"* ]]; then
            echo "No broken links found."
          else
            echo "Broken links found. See output above for details."
            exit 1
          fi

      # Check that:
      # - There are no underscores in URLs
      # - Each .mdx file has a title, description, and canonical URL
      # - Each canonical URL matches the file path
      - name: Test for SEO Issues
        working-directory: docs/
        run: |
          echo "Running SEO validation..."

          echo ""
          echo "Checking for underscores in URLs..."
          files=$(find . -type f -name "*_*" ! -path "./images/*" ! -path "./logo/*")
          if [ -n "$files" ]; then
            echo "❌ Found files with underscores:"
            echo "$files" | sed 's/^/  - /'
            exit 1
          else
            echo "✅ No filenames with underscores (excluding /images/ and /logo/)."
          fi

          echo ""
          echo "Checking that each file has title, description, and canonical URL..."
          missing_meta=0
          for file in $(find . -name "*.mdx" \
            ! -path "./legacy/*" \
            ! -path "./changelog/*" \
            ! -path "./welcome/support.mdx" \
            ! -path "./documentation/aggregates/tantivy.mdx"); do

            title=$(grep -E "^title:" "$file" || true)
            desc=$(grep -E "^description:" "$file" || true)
            canonical=$(grep -E "^canonical:" "$file" || true)

            if [ -z "$title" ] || [ -z "$desc" ] || [ -z "$canonical" ]; then
              echo "❌ Missing metadata in $file"
              missing_meta=1
              continue
            fi

            # Build expected canonical: https://docs.paradedb.com/<relative path without .mdx>
            relative_path=$(echo "$file" | sed 's|^\./||; s|\.mdx$||; s|^docs/||')
            expected_canonical="https://docs.paradedb.com/${relative_path}"

            # Extract canonical from file (strip 'canonical:' and whitespace)
            found_canonical=$(echo "$canonical" | sed 's/^canonical:[[:space:]]*//')

            if [ "$found_canonical" != "$expected_canonical" ]; then
              echo "❌ Canonical URL mismatch in $file"
              echo "   Expected: $expected_canonical"
              echo "   Found:    $found_canonical"
              missing_meta=1
            fi
          done

          if [ "$missing_meta" -eq 1 ]; then
            exit 1
          else
            echo "✅ All files have proper metadata and canonical URLs."
          fi

          echo "🎉 All SEO checks passed!"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Extract pgrx Version
        id: pgrx
        working-directory: pg_search/
        run: |
          version=$(cargo tree --depth 1 -i pgrx -p pg_search | head -n 1 | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Install Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "rust-cache"
          shared-key: pg18-amd64-${{ hashFiles('**/Cargo.lock') }}
          cache-targets: true
          cache-all-crates: true

      - name: Install cargo-pgrx
        run: cargo install -j $(nproc) --locked cargo-pgrx --version "${{ steps.pgrx.outputs.version }}" --debug

      - name: Initialize cargo-pgrx environment
        run: cargo pgrx init "--pg18=download" --configure-flag="--without-readline"

      - name: Add pgrx PostgreSQL binaries to PATH
        run: echo "$(ls -d ~/.pgrx/18.*/pgrx-install/bin | head -n 1)" >> $GITHUB_PATH

      - name: Compile & install pg_search extension (pgrx)
        working-directory: pg_search/
        run: cargo pgrx install --pg-config ~/.pgrx/18.*/pgrx-install/bin/pg_config --features="pg18,block_tracker"

      - name: Add extension to shared_preload_libraries
        working-directory: /home/runner/.pgrx/data-18/
        run: sed -i "s/^#shared_preload_libraries = .*/shared_preload_libraries = 'pg_search'/" postgresql.conf

      - name: Start Postgres (pgrx)
        working-directory: tests/
        run: RUST_BACKTRACE=1 cargo pgrx start pg18

      - name: Smoke Test Code Snippets
        run: ./.github/scripts/smoke_test_code_snippets.sh
