# workflows/test-pg_search-docker.yml
#
# Test pg_search (Docker)
# Test building and running the ParadeDB Docker Image.
#
# This workflow smoke-tests that the image builds and runs on each arch. It
# builds amd64 and arm64 in parallel, each natively on a runner of its own arch.

name: Test pg_search (Docker)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/test-pg_search-docker.yml"
      - "docker/**"
      - "!docker/manifests/**"
      - "!docker/Dockerfile.stressgres"
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref to test."
        required: false
        default: ""
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

concurrency:
  group: test-pg_search-docker-${{ github.head_ref || inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  PG_VERSION: "18"

permissions:
  contents: read

jobs:
  test-paradedb:
    name: Test ${{ matrix.flavor }} Docker Image (${{ matrix.arch }})
    # See https://runs-on.com/configuration/job-labels/ — runs in us-east-1.
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=${{ matrix.runner_family }}
      - cpu=4
      - ram=16
      - image=${{ matrix.runner_image }}
      - volume=80gb # default runner ships with 30GB — see https://runs-on.com/runners/linux/
      - extras=s3-cache
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - paradedb
          - official
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner_family: m7a+m7i
            runner_image: ubuntu24-full-x64
            platform: linux/amd64
          - arch: arm64
            runner_family: m7g+m8g
            runner_image: ubuntu24-full-arm64
            platform: linux/arm64

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The committed Dockerfiles install pg_search from a specific GitHub Release. In
      # paradedb/paradedb this is always already published (the release workflow only commits
      # the regenerated Dockerfiles *after* the .deb is uploaded — see PR #4967), so this gate
      # is a no-op here. In the enterprise rebase, however, the regenerated Dockerfiles for a
      # new version land on the target-patch-* branch *before* that version's enterprise
      # release and its .deb exist, so the image cannot build yet. Detect that pre-release
      # window and skip the smoke test; it runs normally once the referenced release is out.
      - name: Check whether the referenced pg_search release is published
        id: release_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dockerfile="docker/Dockerfile.${{ matrix.flavor }}-${{ env.PG_VERSION }}"
          # Matches both the community (releases/download/vX) and enterprise
          # (api.github.com/repos/<owner>/<repo>/releases/tags/vX) URL forms.
          url="$(grep -oE 'https://(api\.)?github\.com/[^"]*releases/(download|tags)/v[0-9][^"/]*' "$dockerfile" | head -1)"
          if [[ -z "$url" ]]; then
            echo "No pg_search release URL found in ${dockerfile}; running the smoke test."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag="$(grep -oE 'v[0-9][^"/]*' <<< "$url" | head -1)"
          echo "Dockerfile ${dockerfile} pins pg_search ${tag}; gating on ${GITHUB_REPOSITORY}@${tag}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REPOSITORY}@${tag} is published — running the smoke test."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Release ${GITHUB_REPOSITORY}@${tag} is not published yet — skipping the Docker smoke test. It will run once the release exists."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      # Each matrix entry builds its own arch natively (via a runner on that arch) so `--load`
      # works and the `docker run` smoke tests below exercise the image natively. We tag the
      # image `latest` to match the tag used by the smoke tests, and skip pushing since this
      # is just a test build.
      #
      # The BuildKit `type=gha` cache is transparently backed by runs-on's S3 cache (via the
      # `extras=s3-cache` runner label above), so it works without configuring a separate
      # registry cache. Scoped per-arch so amd64 and arm64 don't evict each other.
      - name: Build the ParadeDB Docker Image
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile.${{ matrix.flavor }}-${{ env.PG_VERSION }} \
            --tag paradedb-ci \
            --cache-from type=gha,scope=paradedb-docker-${{ matrix.flavor }}-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=paradedb-docker-${{ matrix.flavor }}-${{ matrix.arch }} \
            --load \
            docker

      - name: Verify PGDG apt packages are available
        if: steps.release_gate.outputs.skip != 'true'
        run: docker run --rm paradedb-ci bash -c 'apt-get update && apt-get install -y --no-install-recommends postgresql-${{ env.PG_VERSION }}-partman'

      # Start the ParadeDB Docker image using `docker run` to test the standalone Docker image.
      # We add a --tmpfs mount as a test of compatibility with the upstream `postgres` image.
      # The `docker run` command uses the local ParadeDB image that we just built and loaded
      # under the `paradedb-ci` tag.
      - name: Start the ParadeDB Docker Image via Docker Run
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          docker run -d \
            --name paradedb \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            -p 5432:5432 \
            --tmpfs /var/lib/postgresql:size=1G \
            paradedb-ci

      - name: Wait for PostgreSQL to be ready
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          echo "Waiting for PostgreSQL to accept connections..."
          for i in $(seq 1 60); do
            if docker exec paradedb pg_isready -U myuser -d mydatabase > /dev/null 2>&1; then
              echo "PostgreSQL is ready after ${i}s"
              break
            fi
            if [ "$(docker inspect -f '{{.State.Status}}' paradedb)" = "exited" ]; then
              echo "Error: Container exited during startup"
              docker logs paradedb
              exit 1
            fi
            sleep 1
          done
          if ! docker exec paradedb pg_isready -U myuser -d mydatabase > /dev/null 2>&1; then
            echo "Error: PostgreSQL did not become ready within 60s"
            docker logs paradedb
            exit 1
          fi

      - name: Check for PostgreSQL errors in container logs
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          echo "Container logs:"
          docker logs paradedb

          # Match actual PostgreSQL log-level ERROR lines, not incidental occurrences of the word
          if docker logs paradedb 2>&1 | grep -qE "^[0-9T:.Z -]*(ERROR|FATAL|PANIC):"; then
            echo "Error: PostgreSQL container logs contain errors"
            exit 1
          fi

      - name: Verify PostgreSQL accepts queries and extensions are available
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          docker exec paradedb psql -U myuser -d mydatabase -c "SELECT 1;"
          docker exec paradedb psql -U myuser -d mydatabase -c "CREATE EXTENSION IF NOT EXISTS pg_search;"
          docker exec paradedb psql -U myuser -d mydatabase -c "SELECT extname, extversion FROM pg_extension ORDER BY extname;"

      - name: Verify barman-cloud is functional
        if: steps.release_gate.outputs.skip != 'true' && matrix.flavor == 'paradedb'
        run: docker exec paradedb barman-cloud-wal-archive --help

      - name: Test Postgres Auto-tuning
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          assert_not_tuned() {
            local name="$1"
            local log_message="$2"
            local tuning_block

            if ! docker logs "$name" 2>&1 | grep -F "$log_message"; then
              echo "Error: ${name} logs did not contain: ${log_message}"
              dump_autotune_container "$name"
              exit 1
            fi
            tuning_block="$(docker exec "$name" bash -c 'awk "/# Begin ParadeDB tuning recommendations/ {show=1} show {print} /# End ParadeDB tuning recommendations/ {show=0}" "$PGDATA/postgresql.conf"')"
            echo "$tuning_block"

            if [ -n "$tuning_block" ]; then
              echo "Error: ${name} unexpectedly appended auto-tuning settings"
              dump_autotune_container "$name"
              exit 1
            fi
          }

          assert_tuned() {
            local name="$1"
            local actual_file
            local expected_file

            expected_file="$(mktemp)"
            actual_file="$(mktemp)"
            cat > "$expected_file"
            docker exec "$name" bash -c 'awk "/# Begin ParadeDB tuning recommendations/ {show=1} show {print} /# End ParadeDB tuning recommendations/ {show=0}" "$PGDATA/postgresql.conf"' > "$actual_file"
            cat "$actual_file"

            if [ ! -s "$actual_file" ]; then
              echo "Error: ${name} did not append auto-tuning settings"
              dump_autotune_container "$name"
              exit 1
            fi

            if ! git diff --no-index -- "$expected_file" "$actual_file"; then
              dump_autotune_container "$name"
              exit 1
            fi
          }

          dump_autotune_container() {
            local name="$1"

            docker ps -a --filter "name=^/${name}$"
            docker logs "$name" 2>&1 || true
            docker exec "$name" bash -c 'awk "/# Begin ParadeDB tuning recommendations/ {show=1} show {print} /# End ParadeDB tuning recommendations/ {show=0}" "$PGDATA/postgresql.conf"' || true
          }

          wait_for_bootstrap() {
            local name="$1"

            for i in $(seq 1 30); do
              if docker logs "$name" 2>&1 | grep -F "ParadeDB bootstrap completed!" > /dev/null; then
                echo "${name} bootstrap completed after ${i}s"
                return 0
              fi
              if [ "$(docker inspect -f '{{.State.Status}}' "$name")" = "exited" ]; then
                echo "Error: ${name} exited before bootstrap completed"
                dump_autotune_container "$name"
                exit 1
              fi
              sleep 1
            done

            echo "Error: ${name} did not finish bootstrap within 30s"
            dump_autotune_container "$name"
            exit 1
          }

          echo "TEST: Skip tuning when it is disabled with PDB_TUNE"
          docker run -d \
            --name paradedb-autotune-disabled \
            --cpus 2 \
            --memory 1g \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            -e PDB_TUNE=false \
            paradedb-ci
          wait_for_bootstrap paradedb-autotune-disabled
          assert_not_tuned paradedb-autotune-disabled "Auto-tuning is disabled, skipping."
          docker rm -f paradedb-autotune-disabled
          echo && echo && echo

          echo "TEST: Skip tuning when memory is less than 512mb"
          docker run -d \
            --name paradedb-autotune-low-memory \
            --cpus 2 \
            --memory 511m \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            paradedb-ci
          wait_for_bootstrap paradedb-autotune-low-memory
          assert_not_tuned paradedb-autotune-low-memory "Available memory is less than 512mb, skipping auto tuning."
          docker rm -f paradedb-autotune-low-memory
          echo && echo && echo

          echo "TEST: Tunes successfully when no explicit limits are set"
          docker run -d \
            --name paradedb-autotune-default-resources \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            paradedb-ci
          wait_for_bootstrap paradedb-autotune-default-resources
          tuning_block="$(docker exec paradedb-autotune-default-resources bash -c 'awk "/# Begin ParadeDB tuning recommendations/ {show=1} show {print} /# End ParadeDB tuning recommendations/ {show=0}" "$PGDATA/postgresql.conf"')"
          echo "$tuning_block"
          if [ -z "$tuning_block" ]; then
            echo "Error: paradedb-autotune-default-resources did not append auto-tuning settings"
            dump_autotune_container paradedb-autotune-default-resources
            exit 1
          fi
          docker rm -f paradedb-autotune-default-resources
          echo && echo && echo

          echo "TEST: Tunes with a fractional CPU value"
          docker run -d \
            --name paradedb-autotune-fractional-cpu \
            --cpus 2.7 \
            --memory 2g \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            paradedb-ci
          wait_for_bootstrap paradedb-autotune-fractional-cpu
          assert_tuned paradedb-autotune-fractional-cpu <<'EOF'
          # Begin ParadeDB tuning recommendations
          # Parameters based on auto-detected 2.7 CPUs and 2048MB RAM
          shared_buffers = '512MB'                      # 25% of RAM, capped at 16GB
          effective_cache_size = '1536MB'               # 75% of RAM
          maintenance_work_mem = '128MB'                # RAM / 16, capped at 2GB
          work_mem = '15MB'                             # (RAM - shared_buffers) / (3 * max_connections), at least 15MB
          max_parallel_workers = '13'                   # CPUs * 5
          max_worker_processes = '21'                   # max_parallel_workers + 8
          max_parallel_workers_per_gather = '1'         # CPUs / 2, at least 1
          max_parallel_maintenance_workers = '2'        # CPUs / 2, at least 2, at most 8
          # End ParadeDB tuning recommendations
          EOF
          docker rm -f paradedb-autotune-fractional-cpu
          echo && echo && echo

          echo "TEST: Tunes with 1 CPU and 1GB RAM"
          docker run -d \
            --name paradedb-autotune-1cpu-1gb \
            --cpus 1 \
            --memory 1g \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            paradedb-ci
          wait_for_bootstrap paradedb-autotune-1cpu-1gb
          assert_tuned paradedb-autotune-1cpu-1gb <<'EOF'
          # Begin ParadeDB tuning recommendations
          # Parameters based on auto-detected 1 CPUs and 1024MB RAM
          shared_buffers = '256MB'                      # 25% of RAM, capped at 16GB
          effective_cache_size = '768MB'                # 75% of RAM
          maintenance_work_mem = '64MB'                 # RAM / 16, capped at 2GB
          work_mem = '15MB'                             # (RAM - shared_buffers) / (3 * max_connections), at least 15MB
          max_parallel_workers = '5'                    # CPUs * 5
          max_worker_processes = '13'                   # max_parallel_workers + 8
          max_parallel_workers_per_gather = '1'         # CPUs / 2, at least 1
          max_parallel_maintenance_workers = '2'        # CPUs / 2, at least 2, at most 8
          # End ParadeDB tuning recommendations
          EOF
          docker rm -f paradedb-autotune-1cpu-1gb
          echo && echo && echo

          echo "TEST: Tunes with 4 CPU and 8GB RAM"
          docker run -d \
            --name paradedb-autotune-4cpu-8gb \
            --cpus 4 \
            --memory 8g \
            -e POSTGRES_USER=myuser \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=mydatabase \
            paradedb-ci
          wait_for_bootstrap paradedb-autotune-4cpu-8gb
          assert_tuned paradedb-autotune-4cpu-8gb <<'EOF'
          # Begin ParadeDB tuning recommendations
          # Parameters based on auto-detected 4 CPUs and 8192MB RAM
          shared_buffers = '2048MB'                     # 25% of RAM, capped at 16GB
          effective_cache_size = '6144MB'               # 75% of RAM
          maintenance_work_mem = '512MB'                # RAM / 16, capped at 2GB
          work_mem = '20MB'                             # (RAM - shared_buffers) / (3 * max_connections), at least 15MB
          max_parallel_workers = '20'                   # CPUs * 5
          max_worker_processes = '28'                   # max_parallel_workers + 8
          max_parallel_workers_per_gather = '2'         # CPUs / 2, at least 1
          max_parallel_maintenance_workers = '2'        # CPUs / 2, at least 2, at most 8
          # End ParadeDB tuning recommendations
          EOF
          docker rm -f paradedb-autotune-4cpu-8gb
          echo && echo && echo

      # Useful for debugging discrepancies between local and remote ParadeDB Docker images
      - name: Print the ParadeDB Docker Image History
        if: steps.release_gate.outputs.skip != 'true'
        run: docker history paradedb-ci

      - name: Print the ParadeDB Docker Image Permissions
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          docker run --name temp-inspect-paradedb --entrypoint /bin/bash paradedb-ci -c "ls -la /var/lib/postgresql"
          docker rm temp-inspect-paradedb

  # Smoke-test that the non-runnable, FROM-scratch extension-image payload builds
  # for PostgreSQL 18 on each arch.
  # This image is only built at release time in publish-paradedb-docker.yml, so
  # without this job a break in the .deb layout or the COPY paths would not surface
  # until a publish fails. Building per arch natively keeps it consistent with the
  # runnable-image job above.
  test-extension-image:
    name: Test Extension Image Build (${{ matrix.arch }})
    # See https://runs-on.com/configuration/job-labels/ — runs in us-east-1.
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=${{ matrix.runner_family }}
      - cpu=4
      - ram=16
      - image=${{ matrix.runner_image }}
      - volume=40gb
      - extras=s3-cache
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner_family: m7a+m7i
            runner_image: ubuntu24-full-x64
            platform: linux/amd64
            deb_sha_arg: PG_SEARCH_DEB_AMD64_SHA256
          - arch: arm64
            runner_family: m7g+m8g
            runner_image: ubuntu24-full-arm64
            platform: linux/arm64
            deb_sha_arg: PG_SEARCH_DEB_ARM64_SHA256

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # The extension image installs pg_search from the same GitHub Release .deb as
      # the runnable images. Resolve that version from the committed Dockerfile and
      # skip if the release isn't published yet — same pre-release gate as the
      # runnable-image job above (matters for the enterprise rebase).
      - name: Check whether the referenced pg_search release is published
        id: release_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dockerfile="docker/Dockerfile.paradedb-${{ env.PG_VERSION }}"
          url="$(grep -oE 'https://(api\.)?github\.com/[^"]*releases/(download|tags)/v[0-9][^"/]*' "$dockerfile" | head -1)"
          if [[ -z "$url" ]]; then
            echo "No pg_search release URL found in ${dockerfile}; building the extension image."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag="$(grep -oE 'v[0-9][^"/]*' <<< "$url" | head -1)"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Dockerfile ${dockerfile} pins pg_search ${tag}; gating on ${GITHUB_REPOSITORY}@${tag}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REPOSITORY}@${tag} is published — building the extension image."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Release ${GITHUB_REPOSITORY}@${tag} is not published yet — skipping the extension image build. It will run once the release exists."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve pg_search .deb Checksum
        id: checksum
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          asset="postgresql-${{ env.PG_VERSION }}-pg-search_${{ steps.release_gate.outputs.version }}-1PARADEDB-trixie_${{ matrix.arch }}.deb"
          url="https://github.com/paradedb/paradedb/releases/download/v${{ steps.release_gate.outputs.version }}/${asset}"
          echo "Fetching ${asset}"
          curl -fsSL -o /tmp/pg_search.deb "$url"
          echo "sha256=$(sha256sum /tmp/pg_search.deb | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"

      # A successful `FROM scratch` build already proves the .deb installs and every
      # COPY glob (library, control file, SQL, license) matched at least one file —
      # an empty glob fails the build. We export the payload and additionally assert
      # the key files are present. Scoped per-arch so amd64 and arm64 don't evict
      # each other in the BuildKit gha/S3 cache.
      - name: Build and Verify the Extension Image
        if: steps.release_gate.outputs.skip != 'true'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file docker/Dockerfile.extension \
            --build-arg BASE=ghcr.io/cloudnative-pg/postgresql:${{ env.PG_VERSION }}-minimal-trixie \
            --build-arg PG_VERSION_MAJOR=${{ env.PG_VERSION }} \
            --build-arg PG_SEARCH_VERSION=${{ steps.release_gate.outputs.version }} \
            --build-arg ${{ matrix.deb_sha_arg }}=${{ steps.checksum.outputs.sha256 }} \
            --cache-from type=gha,scope=paradedb-extension-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=paradedb-extension-${{ matrix.arch }} \
            --output type=local,dest=/tmp/extension-payload \
            docker

          echo "Payload contents:"
          find /tmp/extension-payload -type f | sort

          for required in lib/pg_search.so share/extension/pg_search.control; do
            if [[ ! -f "/tmp/extension-payload/${required}" ]]; then
              echo "Error: extension payload is missing ${required}"
              exit 1
            fi
          done
          echo "Extension payload built successfully and contains the expected library and control file."
