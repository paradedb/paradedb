# workflows/test-pg_search-nix.yml
#
# Test pg_search (Nix)
# Test building and running the ParadeDB Docker Image using Determinate Nix.

name: Test pg_search (Nix)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - 0.*.x # Release branches
    paths:
      - ".github/workflows/test-pg_search-nix.yml"
      - "nix/**"
      - "tokenizers/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "flake.nix"
      - "flake.lock"
  workflow_dispatch:

concurrency:
  group: test-pg_search-nix-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  nix-cargo-hash-check:
    name: Verify Nix Cargo Hash
    runs-on: ubuntu-latest
    env:
      PG_MAJOR_VERSION: "18"

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GHA_CREATE_PR_PAT || github.token }}

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@main

      # This Action uses GitHub Actions' built-in cache to speed up Nix-related CI workflows
      - name: Use Magic Nix Cache Action
        uses: DeterminateSystems/magic-nix-cache-action@main

      # Build only cargo deps to surface cargoHash mismatches quickly, without
      # compiling pg_search for every Postgres variant. If the hash is stale,
      # compute the correct one and push a fix commit to the PR branch.
      - name: Verify Nix Cargo Hash
        id: hash-check
        run: |
          if ! nix build --no-link ".#pg_search-pg${{ env.PG_MAJOR_VERSION }}.cargoDeps" 2>/dev/null; then
            echo "cargoHash mismatch detected, computing correct hash..."
            chmod +x scripts/update-nix-cargo-hash.sh
            scripts/update-nix-cargo-hash.sh "${{ env.PG_MAJOR_VERSION }}"

            if git diff --quiet nix/pg_search.nix; then
              echo "::error::cargoHash mismatch but auto-update failed"
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add nix/pg_search.nix
            git commit -m "fix: update nix cargoHash for changed Cargo.lock"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "::error::cargoHash was outdated and has been auto-fixed. CI will re-run on the updated commit."
            exit 1
          else
            echo "cargoHash is correct"
          fi

      # When the fix commit is pushed with GITHUB_TOKEN, GitHub does not fire a
      # synchronize event, so other CI workflows never re-run on the new HEAD.
      # Closing and reopening the PR forces a "reopened" event that triggers a
      # full CI run on the corrected commit.
      - name: Re-trigger CI on updated HEAD
        if: always() && steps.hash-check.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GHA_CREATE_PR_PAT || github.token }}
        run: |
          gh pr close "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
          gh pr reopen "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
