# workflows/test-stressgres-docker.yml
#
# Test Stressgres (Docker)
# Test building and running the Stressgres Docker Image.

name: Test Stressgres (Docker)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-stressgres-docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # We use dorny/paths-filter instead of on.pull_request.paths because the
  # built-in paths filter skips the entire workflow — including the required
  # gate job — which causes branch protection to block merges indefinitely.
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true' }}
    steps:
      - name: Detect File Changes
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - ".github/workflows/test-stressgres-docker.yml"
              - "docker/Dockerfile.stressgres"
              - "stressgres/**"

  test-stressgres-docker:
    name: Test Stressgres Docker Image
    runs-on: ubicloud-standard-8-arm
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build Stressgres Docker Image
        run: |
          docker build \
            -f docker/Dockerfile.stressgres \
            -t paradedb/stressgres:${{ github.sha }} \
            .

      - name: Run the Stressgres Docker Image
        run: docker run -d --name stressgres paradedb/stressgres:${{ github.sha }}

      - name: Check that the Stressgres Docker Image Runs Properly
        run: |
          CONTAINER_ID=$(docker ps -aq --filter "name=stressgres")
          CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_ID)
          echo "Stressgres container ID: $CONTAINER_ID"
          echo "Container status: $CONTAINER_STATUS"

          echo ""
          echo "Printing logs for the Stressgres Docker container..."
          docker logs $CONTAINER_ID

          # Fail the run if the container failed to start
          if [ "$CONTAINER_STATUS" = "exited" ]; then
            echo "Error: Container failed to start properly"
            exit 1
          fi

  # Required for branch protection — GitHub lacks "required when present" for
  # status checks so this gate always runs and reports pass/fail. Standard pattern:
  # https://github.com/astral-sh/ruff/blob/main/.github/workflows/ci.yaml
  # https://github.com/orgs/community/discussions/26251
  report-results:
    name: Report Results
    if: always()
    needs: [detect-changes, test-stressgres-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI Results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
