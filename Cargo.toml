[workspace]
resolver = "2"
members = [
  "pg_search",
  "tests",
  "tokenizers",
  "benchmarks",
  "macros",
  "stressgres",
]

[workspace.package]
version = "0.21.15"
edition = "2021"
license = "AGPL-3.0"

[profile.dev]
panic = "unwind"

[profile.release]
lto = "fat"
panic = "unwind"
opt-level = 3
codegen-units = 1

[profile.release-with-debug]
inherits = "release"
debug = true

[workspace.dependencies]
tantivy = { path = "../tantivy/js-dsm-ctid", package = "tantivy", features = [
  "columnar-zstd-compression",
  "lz4-compression",
  "quickwit",                  # for sstable support
  "stemmer",
  "stopwords",
], default-features = false }
pgrx = "=0.17.0"
pgrx-tests = "=0.17.0"
tantivy-jieba = "0.17.0"

[patch.crates-io]
tantivy-tokenizer-api = { path = "../tantivy/js-dsm-ctid/tokenizer-api", package = "tantivy-tokenizer-api" }
