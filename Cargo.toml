[workspace]
resolver = "2"
members = [
  "pg_search",
  "tests",
  "tokenizers",
  "benchmarks",
  "macros",
  "stressgres",
]

[workspace.package]
version = "0.23.5"
edition = "2021"
license = "AGPL-3.0"

[profile.dev]
panic = "unwind"

[profile.release]
# Note: We switched from `fat` to `thin` LTO to reduce compile time memory usage, which had been
# sufficient to cause swapping on local machines, and to kill CI builds on smaller instances.
# Benchmarks were unaffected.
lto = "thin"
panic = "unwind"
opt-level = 3
codegen-units = 1

[profile.release-with-debug]
inherits = "release"
debug = true

[workspace.dependencies]
tantivy = { git = "https://github.com/paradedb/tantivy.git", package = "tantivy", rev = "b3e326cff918c9e4fea94db15f2dbfb2d9994de3", features = [
  "columnar-zstd-compression",
  "lz4-compression",
  "paradedb",
  "quickwit",                  # for sstable support
  "stemmer",
  "stopwords",
], default-features = false }
pgrx = "=0.18.0"
pgrx-tests = "=0.18.0"
tantivy-jieba = "0.18.0"

[patch.crates-io]
tantivy-tokenizer-api = { git = "https://github.com/paradedb/tantivy.git", package = "tantivy-tokenizer-api", rev = "b3e326cff918c9e4fea94db15f2dbfb2d9994de3" }
