sampling_seed = 0                                         # unused (no sampling), required by parser
load_format = "parquet"
s3_base_path = "s3://paradedb-benchmarks/datasets/cohere"
tables = []

[root_table]
name = "cohere_wiki"
primary_key = "_id"  # used only if sampled later

[params]
lists = "sqrt({{ dataset_size }})::int"
# ivfflat.probes tuned for ~95% recall@10 (measured): 1m -> 26, 10m -> 42; else fall back to sqrt(lists).
probes = "CASE {{ dataset_size }} WHEN 1000000 THEN 26 WHEN 10000000 THEN 42 ELSE greatest(1, sqrt({{ dataset_size }})::int) END"
