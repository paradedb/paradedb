sampling_seed = 0                                         # unused (no sampling), required by parser
load_format = "parquet"
s3_base_path = "s3://paradedb-benchmarks/datasets/cohere"
tables = []

[root_table]
name = "cohere_wiki"
primary_key = "_id"  # used only if sampled later

# Index parameters referenced from indexes/*.sql via {{ name }}. Values are SQL-scalar expressions
# over recognized variables (dataset_size = nominal row count from --size).
[params]
lists = "{{ dataset_size }} / 100"
