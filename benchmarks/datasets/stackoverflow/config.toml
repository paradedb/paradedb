sampling_seed = 723                                                 # sum of the characters in "ParadeDB" as ascii
s3_base_path = "s3://paradedb-ci-benchmarks/datasets/stackoverflow"

[root_table]
name = "stackoverflow_posts"
primary_key = "id"

[[tables]]
name = "badges"
parent = "stackoverflow_posts"
parent_join_col = "owner_user_id"
join_col = "user_id"

[[tables]]
name = "comments"
parent = "stackoverflow_posts"
parent_join_col = "id"
join_col = "post_id"
